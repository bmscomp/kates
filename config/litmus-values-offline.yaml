# LitmusChaos Helm Values Configuration
# Fully offline configuration using local registry (localhost:5001)
# All images are pulled from local registry with pullPolicy: Never

# Global image pull policy
imagePullPolicy: Never

# Operator configuration
operator:
  image:
    repository: localhost:5001/litmuschaos/chaos-operator
    tag: "3.23.0"
    pullPolicy: Never

# Runner configuration  
runner:
  image:
    repository: localhost:5001/litmuschaos/chaos-runner
    tag: "3.23.0"
    pullPolicy: Never

# Exporter configuration
exporter:
  enabled: true
  image:
    repository: localhost:5001/litmuschaos/chaos-exporter
    tag: "3.23.0"
    pullPolicy: Never
  service:
    type: ClusterIP
    port: 8080
  serviceMonitor:
    enabled: true
    labels:
      release: monitoring

# Resource limits for Kind environment
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Portal/UI configuration
portal:
  server:
    enabled: true  
    image:
      repository: localhost:5001/litmuschaos/litmusportal-server
      tag: "3.23.0"
      pullPolicy: Never
    service:
      type: ClusterIP
      port: 9002
  
  frontend:
    enabled: true
    image:
      repository: localhost:5001/litmuschaos/litmusportal-frontend
      tag: "3.23.0"
      pullPolicy: Never
    service:
      type: NodePort
      port: 9091
      nodePort: 30091
  
  authServer:
    enabled: true
    image:
      repository: localhost:5001/litmuschaos/litmusportal-auth-server
      tag: "3.23.0"
      pullPolicy: Never

# ServiceAccount
serviceAccount:
  create: true
  name: litmus

# MongoDB configuration
mongodb:
  enabled: true
  image:
    registry: localhost:5001
    repository: docker.io/bitnami/mongodb
    tag: "latest"
    pullPolicy: Never
  auth:
    enabled: false
  persistence:
    enabled: true
    size: 8Gi
  extraEnvVars:
    - name: EXPERIMENTAL_DOCKER_DESKTOP_FORCE_QEMU
      value: "1"
  arbiter:
    enabled: false
  volumePermissions:
    enabled: true
    image:
      registry: localhost:5001
      repository: docker.io/bitnamilegacy/os-shell
      tag: "12-debian-12-r51"
      pullPolicy: Never

# Subscriber configuration
subscriber:
  enabled: true
  image:
    repository: localhost:5001/litmuschaos/litmusportal-subscriber
    tag: "3.23.0"
    pullPolicy: Never

# Event tracker configuration
eventTracker:
  enabled: true
  image:
    repository: localhost:5001/litmuschaos/litmusportal-event-tracker
    tag: "3.23.0"
    pullPolicy: Never

# Workflow controller (if needed)
workflowController:
  image:
    repository: localhost:5001/litmuschaos/workflow-controller
    tag: "v3.4.16"
    pullPolicy: Never

# Default chaos experiment runner
chaosRunner:
  image:
    repository: localhost:5001/litmuschaos/go-runner
    tag: "3.23.0"
    pullPolicy: Never
