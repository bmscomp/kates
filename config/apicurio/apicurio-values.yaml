# Apicurio Registry Helm Values Configuration

image:
  repository: apicurio/apicurio-registry-kafkasql
  tag: "2.2.5.Final"
  pullPolicy: IfNotPresent

replicaCount: 1

# Disable internal Kafka dependency
kafka:
  enabled: false

# Configure external Kafka connection (Strimzi)
global:
  kafka:
    bootstrapServers:
      - "krafter-kafka-bootstrap.kafka.svc:9092"
    properties:
      security.protocol: SASL_PLAINTEXT
      sasl.mechanism: SCRAM-SHA-512
      sasl.jaas.config: >-
        org.apache.kafka.common.security.scram.ScramLoginModule required
        username="apicurio-registry"
        password="${APICURIO_KAFKA_PASSWORD}";

# Service Configuration
service:
  type: NodePort
  port: 8080
  nodePort: 30082
