# Kafka Connect cluster for data pipeline integration.
# Deploy connectors via KafkaConnector CRs after this cluster is running.

apiVersion: kafka.strimzi.io/v1
kind: KafkaConnect
metadata:
  name: kates-connect
  namespace: kafka
  labels:
    strimzi.io/cluster: krafter
  annotations:
    strimzi.io/use-connector-resources: "true"
spec:
  version: 4.2.0
  replicas: 1
  bootstrapServers: krafter-kafka-bootstrap:9092
  authentication:
    type: scram-sha-512
    username: kates-connect
    passwordSecret:
      secretName: kates-connect
      password: password
  build:
    output:
      type: docker
      image: kind-registry:5000/kates-connect:latest
    plugins:
      - name: debezium-postgres
        artifacts:
          - type: maven
            group: io.debezium
            artifact: debezium-connector-postgres
            version: 3.1.1.Final
      - name: camel-s3-sink
        artifacts:
          - type: maven
            group: org.apache.camel.kafkaconnector
            artifact: camel-aws-s3-sink-kafka-connector
            version: 4.8.3
      - name: jdbc-sink
        artifacts:
          - type: maven
            group: io.aiven
            artifact: jdbc-connector-for-apache-kafka
            version: 6.11.1
  config:
    group.id: kates-connect
    offset.storage.topic: kates-connect-offsets
    config.storage.topic: kates-connect-configs
    status.storage.topic: kates-connect-status
    offset.storage.replication.factor: 3
    config.storage.replication.factor: 3
    status.storage.replication.factor: 3
    key.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter: org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable: false
    value.converter.schemas.enable: false
  logging:
    type: inline
    loggers:
      connect.root.logger.level: "INFO"
      log4j.logger.org.apache.kafka.connect: "INFO"
      log4j.logger.org.apache.kafka.connect.runtime.WorkerSourceTask: "WARN"
      log4j.logger.org.reflections: "ERROR"
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m
  metricsConfig:
    type: jmxPrometheusExporter
    valueFrom:
      configMapKeyRef:
        name: kafka-metrics
        key: kafka-metrics-config.yml
  template:
    pod:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      metadata:
        labels:
          app: kates-connect
    connectContainer:
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
    podDisruptionBudget:
      maxUnavailable: 0
---
# File sink connector for test results archival
apiVersion: kafka.strimzi.io/v1
kind: KafkaConnector
metadata:
  name: kates-results-sink
  namespace: kafka
  labels:
    strimzi.io/cluster: kates-connect
spec:
  class: org.apache.kafka.connect.file.FileStreamSinkConnector
  tasksMax: 1
  autoRestart:
    enabled: true
    maxRestarts: 5
  config:
    topics: kates-results
    file: /tmp/kates-results.log
    key.converter: org.apache.kafka.connect.storage.StringConverter
    value.converter: org.apache.kafka.connect.storage.StringConverter
    errors.tolerance: all
    errors.deadletterqueue.topic.name: kates-connect-dlq
    errors.deadletterqueue.topic.replication.factor: 3
    errors.deadletterqueue.context.headers.enable: true
    errors.log.enable: true
    errors.log.include.messages: true
---
# PodMonitor for Connect metrics
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: kafka-connect-metrics
  namespace: kafka
  labels:
    app: strimzi
    release: monitoring
spec:
  selector:
    matchLabels:
      strimzi.io/kind: KafkaConnect
  namespaceSelector:
    matchNames:
      - kafka
  podMetricsEndpoints:
    - path: /metrics
      port: tcp-prometheus
      relabelings:
        - separator: ;
          regex: __meta_kubernetes_pod_label_(.+)
          replacement: $1
          action: labelmap
        - sourceLabels: [__meta_kubernetes_namespace]
          action: replace
          targetLabel: kubernetes_namespace
        - sourceLabels: [__meta_kubernetes_pod_name]
          action: replace
          targetLabel: kubernetes_pod_name
