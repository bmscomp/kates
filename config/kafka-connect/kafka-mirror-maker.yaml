# MirrorMaker 2 for cross-cluster Kafka replication (disaster recovery).
# Configure the source cluster bootstrap servers before deploying.

apiVersion: kafka.strimzi.io/v1
kind: KafkaMirrorMaker2
metadata:
  name: krafter-mirror
  namespace: kafka
  labels:
    strimzi.io/cluster: krafter
spec:
  version: 4.2.0
  replicas: 1
  connectCluster: target
  clusters:
    - alias: source
      bootstrapServers: source-kafka-bootstrap:9092
      authentication:
        type: scram-sha-512
        username: mirror-source
        passwordSecret:
          secretName: mirror-source-credentials
          password: password
    - alias: target
      bootstrapServers: krafter-kafka-bootstrap:9092
      authentication:
        type: scram-sha-512
        username: kates-backend
        passwordSecret:
          secretName: kates-backend
          password: password
      config:
        config.storage.replication.factor: 3
        offset.storage.replication.factor: 3
        status.storage.replication.factor: 3
  mirrors:
    - sourceCluster: source
      targetCluster: target
      sourceConnector:
        tasksMax: 2
        autoRestart:
          enabled: true
          maxRestarts: 10
        config:
          replication.factor: 3
          offset-syncs.topic.replication.factor: 3
          sync.topic.acls.enabled: "false"
          refresh.topics.interval.seconds: "60"
      heartbeatConnector:
        autoRestart:
          enabled: true
        config:
          heartbeats.topic.replication.factor: 3
      checkpointConnector:
        autoRestart:
          enabled: true
        config:
          checkpoints.topic.replication.factor: 3
          sync.group.offsets.enabled: "true"
          refresh.groups.interval.seconds: "60"
      topicsPattern: "kates-.*"
      groupsPattern: ".*"
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 500m
  logging:
    type: inline
    loggers:
      connect.root.logger.level: "INFO"
      log4j.logger.org.apache.kafka.connect.mirror: "INFO"
      log4j.logger.org.reflections: "ERROR"
  metricsConfig:
    type: jmxPrometheusExporter
    valueFrom:
      configMapKeyRef:
        name: kafka-metrics
        key: kafka-metrics-config.yml
  template:
    pod:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
    connectContainer:
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
    podDisruptionBudget:
      maxUnavailable: 0
---
# PodMonitor for MirrorMaker2 metrics
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: kafka-mirror-maker-metrics
  namespace: kafka
  labels:
    app: strimzi
    release: monitoring
spec:
  selector:
    matchLabels:
      strimzi.io/kind: KafkaMirrorMaker2
  namespaceSelector:
    matchNames:
      - kafka
  podMetricsEndpoints:
    - path: /metrics
      port: tcp-prometheus
      relabelings:
        - separator: ;
          regex: __meta_kubernetes_pod_label_(.+)
          replacement: $1
          action: labelmap
        - sourceLabels: [__meta_kubernetes_namespace]
          action: replace
          targetLabel: kubernetes_namespace
        - sourceLabels: [__meta_kubernetes_pod_name]
          action: replace
          targetLabel: kubernetes_pod_name
