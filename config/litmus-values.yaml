# LitmusChaos Helm Values Configuration
# Customized for Kind cluster with local registry
# Using 3.24.0 versions matching the Litmus Helm chart defaults

# Operator configuration
operator:
  image:
    repository: litmuschaos/chaos-operator
    tag: "3.24.0"
    pullPolicy: Never

# Runner configuration  
runner:
  image:
    repository: litmuschaos/chaos-runner
    tag: "3.24.0"
    pullPolicy: Never

# Exporter configuration
exporter:
  enabled: true
  image:
    repository: litmuschaos/chaos-exporter
    tag: "3.24.0"
    pullPolicy: Never
  service:
    type: ClusterIP
    port: 8080
  serviceMonitor:
    enabled: true
    labels:
      release: monitoring

# Resource limits for Kind environment
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Portal/UI configuration
portal:
  server:
    enabled: true  
    image:
      repository: litmusportal-server
      tag: "3.24.0"
      pullPolicy: Never
    service:
      type: ClusterIP
      port: 9002
  frontend:
    enabled: true
    image:
      repository: litmusportal-frontend
      tag: "3.24.0"
      pullPolicy: Never
    service:
      type: ClusterIP
      port: 9091

# ServiceAccount
serviceAccount:
  create: true
  name: litmus

# MongoDB configuration - using Bitnami image for replicaset mode
mongodb:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/mongodb
    tag: "latest"
    pullPolicy: Never
  # ReplicaSet mode required - litmus server expects replica set topology
  architecture: replicaset
  replicaCount: 1
  # Arbiter disabled for single replica
  arbiter:
    enabled: false
  # Security context for volume permissions
  podSecurityContext:
    enabled: true
    fsGroup: 1001
  containerSecurityContext:
    enabled: true
    runAsUser: 1001
    runAsNonRoot: true
  persistence:
    enabled: true
    size: 2Gi
  volumePermissions:
    enabled: true
    image:
      registry: docker.io
      repository: bitnamilegacy/os-shell
      tag: "12-debian-12-r51"
      pullPolicy: Never
    securityContext:
      runAsUser: 0
  # Resource limits
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
