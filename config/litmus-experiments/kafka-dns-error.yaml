apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: kafka-dns-error
  namespace: kafka
spec:
  annotationCheck: 'false'
  engineState: active
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-dns-error
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: '30'
            - name: TARGET_HOSTNAMES
              value: 'krafter-kafka-bootstrap.kafka.svc'
            - name: APP_NS
              value: 'kafka'
            - name: APP_LABEL
              value: 'strimzi.io/component-type=kafka'
            - name: TARGET_PODS
              value: 'krafter-pool-gamma-1'
            - name: TARGET_CONTAINER
              value: 'kafka'
        probe:
          - name: check-kafka-health
            type: cmdProbe
            mode: Continuous
            runProperties:
              probeTimeout: "10s"
              interval: "5s"
              retry: 2
            cmdProbe/inputs:
              command: kubectl get kafka krafter -n kafka -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
              comparator:
                type: string
                criteria: equal
                value: "True"
