apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: kafka-gameday-
  namespace: kafka
  labels:
    app: kafka-gameday
    type: chaos-workflow
spec:
  entrypoint: kafka-gameday-chaos
  serviceAccountName: argo-chaos
  
  # Workflow-level configuration
  ttlStrategy:
    secondsAfterCompletion: 86400  # Keep for 24 hours
  
  arguments:
    parameters:
      - name: chaos-duration
        value: "60"
      - name: target-namespace
        value: "kafka"
  
  templates:
    # Main orchestration template
    - name: kafka-gameday-chaos
      steps:
        # Step 1: Pre-chaos health check
        - - name: pre-chaos-health
            template: kafka-health-check
            arguments:
              parameters:
                - name: phase
                  value: "pre-chaos"
        
        # Step 2: Network latency injection
        - - name: network-latency
            template: run-chaos-engine
            arguments:
              parameters:
                - name: engine-name
                  value: "gameday-network-latency"
                - name: experiment-type
                  value: "pod-network-latency"
        
        # Step 3: Wait for recovery
        - - name: recovery-wait-1
            template: wait
            arguments:
              parameters:
                - name: duration
                  value: "30s"
        
        # Step 4: Mid-chaos health check
        - - name: mid-chaos-health
            template: kafka-health-check
            arguments:
              parameters:
                - name: phase
                  value: "mid-chaos"
        
        # Step 5: CPU stress injection
        - - name: cpu-stress
            template: run-chaos-engine
            arguments:
              parameters:
                - name: engine-name
                  value: "gameday-cpu-stress"
                - name: experiment-type
                  value: "pod-cpu-hog"
        
        # Step 6: Wait for recovery
        - - name: recovery-wait-2
            template: wait
            arguments:
              parameters:
                - name: duration
                  value: "30s"
        
        # Step 7: Pod delete (broker failure)
        - - name: pod-delete
            template: run-chaos-engine
            arguments:
              parameters:
                - name: engine-name
                  value: "gameday-pod-delete"
                - name: experiment-type
                  value: "pod-delete"
        
        # Step 8: Wait for full recovery
        - - name: recovery-wait-3
            template: wait
            arguments:
              parameters:
                - name: duration
                  value: "60s"
        
        # Step 9: Final health check
        - - name: post-chaos-health
            template: kafka-health-check
            arguments:
              parameters:
                - name: phase
                  value: "post-chaos"
        
        # Step 10: Generate report
        - - name: generate-report
            template: chaos-report

    # Kafka health check template
    - name: kafka-health-check
      inputs:
        parameters:
          - name: phase
      container:
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args:
          - -c
          - |
            echo "=== {{inputs.parameters.phase}} Health Check ==="
            echo "Checking Kafka cluster status..."
            READY=$(kubectl get kafka krafter -n kafka -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
            echo "Kafka Ready: $READY"
            
            echo "Checking broker pods..."
            kubectl get pods -n kafka -l strimzi.io/component-type=kafka
            
            echo "Checking consumer groups..."
            kubectl exec -n kafka krafter-pool-alpha-0 -- kafka-consumer-groups.sh \
              --bootstrap-server localhost:9092 \
              --list 2>/dev/null || echo "No consumer groups"
            
            if [ "$READY" != "True" ]; then
              echo "ERROR: Kafka is not ready!"
              exit 1
            fi
            echo "Health check passed!"

    # Run chaos engine template
    - name: run-chaos-engine
      inputs:
        parameters:
          - name: engine-name
          - name: experiment-type
      container:
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args:
          - -c
          - |
            echo "Starting {{inputs.parameters.experiment-type}} experiment..."
            
            # Create inline chaos engine
            cat <<EOF | kubectl apply -f -
            apiVersion: litmuschaos.io/v1alpha1
            kind: ChaosEngine
            metadata:
              name: {{inputs.parameters.engine-name}}
              namespace: kafka
            spec:
              annotationCheck: 'false'
              engineState: active
              chaosServiceAccount: litmus-admin
              experiments:
                - name: {{inputs.parameters.experiment-type}}
                  spec:
                    components:
                      env:
                        - name: TOTAL_CHAOS_DURATION
                          value: '{{workflow.parameters.chaos-duration}}'
                        - name: APP_NS
                          value: 'kafka'
                        - name: APP_LABEL
                          value: 'strimzi.io/component-type=kafka'
                        - name: TARGET_PODS
                          value: 'krafter-pool-alpha-0'
            EOF
            
            # Wait for engine to complete
            echo "Waiting for chaos engine to complete..."
            sleep 90
            
            # Check result
            STATUS=$(kubectl get chaosengine {{inputs.parameters.engine-name}} -n kafka -o jsonpath='{.status.engineStatus}')
            VERDICT=$(kubectl get chaosresult -n kafka -o jsonpath='{.items[0].status.experimentStatus.verdict}' 2>/dev/null || echo "N/A")
            
            echo "Engine Status: $STATUS"
            echo "Experiment Verdict: $VERDICT"
            
            # Cleanup
            kubectl delete chaosengine {{inputs.parameters.engine-name}} -n kafka --ignore-not-found
            kubectl delete chaosresult -n kafka --all --ignore-not-found

    # Wait template
    - name: wait
      inputs:
        parameters:
          - name: duration
      container:
        image: busybox
        imagePullPolicy: IfNotPresent
        command: ["sleep"]
        args: ["{{inputs.parameters.duration}}"]

    # Generate chaos report
    - name: chaos-report
      container:
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args:
          - -c
          - |
            echo "========================================"
            echo "       KAFKA GAMEDAY CHAOS REPORT"
            echo "========================================"
            echo ""
            echo "Workflow: $HOSTNAME"
            echo "Date: $(date -Iseconds)"
            echo ""
            echo "=== Final Cluster Status ==="
            kubectl get kafka krafter -n kafka -o jsonpath='{.status}' | jq '.' 2>/dev/null || echo "Could not get status"
            echo ""
            echo "=== Broker Pod Status ==="
            kubectl get pods -n kafka -l strimzi.io/component-type=kafka
            echo ""
            echo "=== Chaos Results Summary ==="
            kubectl get chaosresult -n kafka -o custom-columns='NAME:.metadata.name,VERDICT:.status.experimentStatus.verdict,PHASE:.status.experimentStatus.phase' 2>/dev/null || echo "No results found"
            echo ""
            echo "=== Events During GameDay ==="
            kubectl get events -n kafka --sort-by='.lastTimestamp' | tail -20
            echo ""
            echo "========================================"
            echo "         GAMEDAY COMPLETE"
            echo "========================================"
