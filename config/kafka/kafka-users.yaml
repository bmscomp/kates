# KafkaUser resources for SCRAM-SHA-512 authentication.
# Each user gets a Secret with the password auto-generated by Strimzi.
# Secret name = KafkaUser name, key = "password".

# kates-backend: superUser — full access, declared in Kafka CR authorization.
# No ACLs needed since superUsers bypass authorization.
apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: kates-backend
  namespace: kafka
  labels:
    strimzi.io/cluster: krafter
spec:
  authentication:
    type: scram-sha-512
---
# kafka-ui: admin-level read access for monitoring the cluster.
apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: kafka-ui
  namespace: kafka
  labels:
    strimzi.io/cluster: krafter
spec:
  authentication:
    type: scram-sha-512
  quotas:
    producerByteRate: 1048576
    consumerByteRate: 52428800
    requestPercentage: 10
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: "*"
          patternType: literal
        operations: ["Describe", "Read"]
        host: "*"
      - resource:
          type: group
          name: "*"
          patternType: literal
        operations: ["Describe", "Read"]
        host: "*"
      - resource:
          type: cluster
        operations: ["Describe"]
        host: "*"
---
# apicurio-registry: read/write on its internal topics (__apicurio*).
apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: apicurio-registry
  namespace: kafka
  labels:
    strimzi.io/cluster: krafter
spec:
  authentication:
    type: scram-sha-512
  quotas:
    producerByteRate: 10485760
    consumerByteRate: 20971520
    requestPercentage: 15
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: "__apicurio"
          patternType: prefix
        operations: ["Read", "Write", "Create", "Describe"]
        host: "*"
      - resource:
          type: group
          name: "apicurio"
          patternType: prefix
        operations: ["Read", "Describe"]
        host: "*"
---
# litmus-chaos: read/write on test topics for chaos experiments.
apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: litmus-chaos
  namespace: kafka
  labels:
    strimzi.io/cluster: krafter
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: "*"
          patternType: literal
        operations: ["Read", "Write", "Create", "Delete", "Describe", "Alter"]
        host: "*"
      - resource:
          type: group
          name: "litmus"
          patternType: prefix
        operations: ["Read", "Describe"]
        host: "*"
      - resource:
          type: cluster
        operations: ["Describe"]
        host: "*"
---
# kates-connect: scoped access for Kafka Connect internal topics + pipeline topics.
apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: kates-connect
  namespace: kafka
  labels:
    strimzi.io/cluster: krafter
spec:
  authentication:
    type: scram-sha-512
  quotas:
    producerByteRate: 52428800
    consumerByteRate: 52428800
    requestPercentage: 25
  authorization:
    type: simple
    acls:
      # Connect internal topics (offsets, configs, status)
      - resource:
          type: topic
          name: "kates-connect-"
          patternType: prefix
        operations: ["Read", "Write", "Create", "Describe"]
        host: "*"
      # Source/sink pipeline topics
      - resource:
          type: topic
          name: "kates-"
          patternType: prefix
        operations: ["Read", "Write", "Create", "Describe"]
        host: "*"
      # Consumer groups
      - resource:
          type: group
          name: "kates-connect"
          patternType: prefix
        operations: ["Read", "Describe"]
        host: "*"
      - resource:
          type: cluster
        operations: ["Describe"]
        host: "*"
