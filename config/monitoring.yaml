grafana:
  adminPassword: "admin"
  image:
    tag: "12.3.1"  # Updated from 11.4.0
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    nodePort: 30080
  # Updated to v2.2.3 to avoid platform architecture manifest issues with v1.27.6
  # Newer version has cleaner manifests and works properly on Apple Silicon
  sidecar:
    image:
      tag: "2.2.3"  # Updated from 1.27.6
      pullPolicy: IfNotPresent
    imagePullPolicy: IfNotPresent
    dashboards:
      enabled: true  # Re-enabled with working version
    datasources:
      enabled: true  # Re-enabled with working version

prometheus:
  prometheusSpec:
    image:
      tag: v3.9.1  # Updated from v3.1.0
      pullPolicy: IfNotPresent
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

# Global image pull policy - use images already in Kind
global:
  imagePullPolicy: IfNotPresent

# Component configurations
prometheusOperator:
  image:
    tag: v0.79.2
    pullPolicy: IfNotPresent
  prometheusConfigReloader:
    image:
      tag: v0.79.2
      pullPolicy: IfNotPresent
  admissionWebhooks:
    patch:
      image:
        pullPolicy: IfNotPresent

alertmanager:
  alertmanagerSpec:
    image:
      tag: v0.28.1
      pullPolicy: IfNotPresent

kube-state-metrics:
  image:
    tag: v2.14.0
    pullPolicy: IfNotPresent

prometheus-node-exporter:
  image:
    tag: v1.8.2
    pullPolicy: IfNotPresent

admissionWebhooks:
  enabled: true
  deployment:
    image:
      tag: v0.79.2
      pullPolicy: IfNotPresent
  patch:
    enabled: true
    image:
      tag: v1.6.5
      pullPolicy: IfNotPresent

# Ensure all init containers and sidecars also use IfNotPresent
defaultRules:
  create: true

# Kubelet metrics
kubelet:
  enabled: true
