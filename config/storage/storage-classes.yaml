# Zone-Specific Storage Classes for Kafka Multi-AZ Deployment
# Each storage class is bound to a specific availability zone using allowedTopologies
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage-alpha
  labels:
    zone: alpha
provisioner: rancher.io/local-path
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowedTopologies:
  - matchLabelExpressions:
      - key: topology.kubernetes.io/zone
        values:
          - alpha
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage-gamma
  labels:
    zone: gamma
provisioner: rancher.io/local-path
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowedTopologies:
  - matchLabelExpressions:
      - key: topology.kubernetes.io/zone
        values:
          - gamma
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage-sigma
  labels:
    zone: sigma
provisioner: rancher.io/local-path
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowedTopologies:
  - matchLabelExpressions:
      - key: topology.kubernetes.io/zone
        values:
          - sigma
