apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: kafka-network-partition
  namespace: kafka
  labels:
    app.kubernetes.io/managed-by: kates
    kates.klster.com/scenario: network-partition
spec:
  annotationCheck: 'false'
  engineState: active
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-network-loss
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: '60'
            - name: NETWORK_INTERFACE
              value: 'eth0'
            # 100% packet loss = full network partition
            - name: NETWORK_PACKET_LOSS_PERCENTAGE
              value: '100'
            - name: APP_NS
              value: 'kafka'
            - name: APP_LABEL
              value: 'strimzi.io/component-type=kafka'
            - name: TARGET_PODS
              value: 'krafter-pool-alpha-0'
            # Only affect traffic to other brokers (not client traffic)
            - name: DESTINATION_IPS
              value: ''
        probe:
          - name: verify-partition-healing
            type: cmdProbe
            mode: PostChaos
            runProperties:
              probeTimeout: "120s"
              interval: "15s"
              retry: 8
            cmdProbe/inputs:
              command: |
                kubectl exec -n kafka krafter-pool-alpha-1 -- kafka-topics.sh \
                  --bootstrap-server localhost:9092 \
                  --describe --under-replicated-partitions 2>&1 | wc -l
              comparator:
                type: int
                criteria: "<="
                value: "1"
          - name: verify-broker-rejoins-isr
            type: cmdProbe
            mode: PostChaos
            runProperties:
              probeTimeout: "180s"
              interval: "15s"
              retry: 6
            cmdProbe/inputs:
              command: |
                kubectl exec -n kafka krafter-pool-alpha-0 -- kafka-broker-api-versions.sh \
                  --bootstrap-server localhost:9092 2>&1 | grep -c "ApiVersion" || echo "0"
              comparator:
                type: int
                criteria: ">="
                value: "1"
