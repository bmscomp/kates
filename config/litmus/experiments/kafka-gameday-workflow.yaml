apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: kafka-gameday-
  namespace: kafka
  labels:
    app: kafka-gameday
    type: chaos-workflow
    app.kubernetes.io/managed-by: kates
spec:
  entrypoint: kafka-gameday-chaos
  serviceAccountName: argo-chaos

  ttlStrategy:
    secondsAfterCompletion: 86400

  arguments:
    parameters:
      - name: chaos-duration
        value: "60"
      - name: recovery-wait
        value: "60"
      - name: target-namespace
        value: "kafka"
      - name: scenarios
        value: "rolling-restart,leader-kill,network-partition,cpu-stress,pod-delete,disk-stress,multi-broker-kill"
      - name: sla-rto-sec
        value: "30"
      - name: sla-max-loss-pct
        value: "0.1"

  templates:
    - name: kafka-gameday-chaos
      steps:
        # Pre-flight health check
        - - name: pre-chaos-health
            template: kafka-health-check
            arguments:
              parameters:
                - name: phase
                  value: "pre-chaos"

        # Scenario 1: Rolling restart (baseline — should yield zero loss)
        - - name: rolling-restart
            template: run-scenario
            when: "'{{workflow.parameters.scenarios}}' =~ 'rolling-restart'"
            arguments:
              parameters:
                - name: scenario-name
                  value: "rolling-restart"
                - name: experiment-type
                  value: "pod-delete"
                - name: extra-env
                  value: "FORCE=false,CHAOS_INTERVAL=60,PODS_AFFECTED_PERC=34"

        - - name: recovery-1
            template: wait-and-verify
            arguments:
              parameters:
                - name: phase
                  value: "rolling-restart"

        # Scenario 2: Leader kill (core RPO test)
        - - name: leader-kill
            template: run-scenario
            when: "'{{workflow.parameters.scenarios}}' =~ 'leader-kill'"
            arguments:
              parameters:
                - name: scenario-name
                  value: "leader-kill"
                - name: experiment-type
                  value: "pod-delete"
                - name: extra-env
                  value: "FORCE=true,TARGET_PODS=krafter-pool-alpha-0,PODS_AFFECTED_PERC=100"

        - - name: recovery-2
            template: wait-and-verify
            arguments:
              parameters:
                - name: phase
                  value: "leader-kill"

        # Scenario 3: Network partition (split-brain)
        - - name: network-partition
            template: run-scenario
            when: "'{{workflow.parameters.scenarios}}' =~ 'network-partition'"
            arguments:
              parameters:
                - name: scenario-name
                  value: "network-partition"
                - name: experiment-type
                  value: "pod-network-loss"
                - name: extra-env
                  value: "NETWORK_PACKET_LOSS_PERCENTAGE=100,NETWORK_INTERFACE=eth0"

        - - name: recovery-3
            template: wait-and-verify
            arguments:
              parameters:
                - name: phase
                  value: "network-partition"

        # Scenario 4: CPU stress (degraded performance)
        - - name: cpu-stress
            template: run-scenario
            when: "'{{workflow.parameters.scenarios}}' =~ 'cpu-stress'"
            arguments:
              parameters:
                - name: scenario-name
                  value: "cpu-stress"
                - name: experiment-type
                  value: "pod-cpu-hog"
                - name: extra-env
                  value: "CPU_CORES=2,CPU_LOAD=80"

        - - name: recovery-4
            template: wait-and-verify
            arguments:
              parameters:
                - name: phase
                  value: "cpu-stress"

        # Scenario 5: Single broker pod delete
        - - name: pod-delete
            template: run-scenario
            when: "'{{workflow.parameters.scenarios}}' =~ 'pod-delete'"
            arguments:
              parameters:
                - name: scenario-name
                  value: "pod-delete"
                - name: experiment-type
                  value: "pod-delete"
                - name: extra-env
                  value: "FORCE=false,PODS_AFFECTED_PERC=33"

        - - name: recovery-5
            template: wait-and-verify
            arguments:
              parameters:
                - name: phase
                  value: "pod-delete"

        # Scenario 6: Disk I/O stress
        - - name: disk-stress
            template: run-scenario
            when: "'{{workflow.parameters.scenarios}}' =~ 'disk-stress'"
            arguments:
              parameters:
                - name: scenario-name
                  value: "disk-stress"
                - name: experiment-type
                  value: "pod-io-stress"
                - name: extra-env
                  value: "FILESYSTEM_UTILIZATION_PERCENTAGE=80,NUMBER_OF_WORKERS=4"

        - - name: recovery-6
            template: wait-and-verify
            arguments:
              parameters:
                - name: phase
                  value: "disk-stress"

        # Scenario 7: Multi-broker kill (catastrophic — last)
        - - name: multi-broker-kill
            template: run-scenario
            when: "'{{workflow.parameters.scenarios}}' =~ 'multi-broker-kill'"
            arguments:
              parameters:
                - name: scenario-name
                  value: "multi-broker-kill"
                - name: experiment-type
                  value: "pod-delete"
                - name: extra-env
                  value: "FORCE=true,PODS_AFFECTED_PERC=67"

        - - name: recovery-7
            template: wait-and-verify
            arguments:
              parameters:
                - name: phase
                  value: "multi-broker-kill"

        # Final report
        - - name: generate-report
            template: chaos-report

    # Run a single chaos scenario
    - name: run-scenario
      inputs:
        parameters:
          - name: scenario-name
          - name: experiment-type
          - name: extra-env
      container:
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args:
          - -c
          - |
            echo "=== Starting scenario: {{inputs.parameters.scenario-name}} ==="
            FAULT_START=$(date +%s)

            # Parse extra env into ChaosEngine env block
            ENV_BLOCK=""
            IFS=',' read -ra PAIRS <<< "{{inputs.parameters.extra-env}}"
            for pair in "${PAIRS[@]}"; do
              KEY=$(echo "$pair" | cut -d= -f1)
              VAL=$(echo "$pair" | cut -d= -f2-)
              ENV_BLOCK="${ENV_BLOCK}
                        - name: ${KEY}
                          value: '${VAL}'"
            done

            cat <<EOF | kubectl apply -f -
            apiVersion: litmuschaos.io/v1alpha1
            kind: ChaosEngine
            metadata:
              name: gameday-{{inputs.parameters.scenario-name}}
              namespace: kafka
            spec:
              annotationCheck: 'false'
              engineState: active
              chaosServiceAccount: litmus-admin
              experiments:
                - name: {{inputs.parameters.experiment-type}}
                  spec:
                    components:
                      env:
                        - name: TOTAL_CHAOS_DURATION
                          value: '{{workflow.parameters.chaos-duration}}'
                        - name: APP_NS
                          value: 'kafka'
                        - name: APP_LABEL
                          value: 'strimzi.io/component-type=kafka'
            ${ENV_BLOCK}
            EOF

            echo "ChaosEngine created. Waiting for completion..."
            sleep $(({{workflow.parameters.chaos-duration}} + 30))

            VERDICT=$(kubectl get chaosresult -n kafka \
              -o jsonpath='{.items[0].status.experimentStatus.verdict}' 2>/dev/null || echo "N/A")
            echo "Verdict: $VERDICT"

            kubectl delete chaosengine gameday-{{inputs.parameters.scenario-name}} \
              -n kafka --ignore-not-found
            kubectl delete chaosresult -n kafka --all --ignore-not-found

            echo "Scenario {{inputs.parameters.scenario-name}} complete (started at epoch $FAULT_START)"

    # Wait for recovery and verify health
    - name: wait-and-verify
      inputs:
        parameters:
          - name: phase
      container:
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args:
          - -c
          - |
            echo "=== Recovery phase: {{inputs.parameters.phase}} ==="
            RECOVERY_START=$(date +%s)

            echo "Waiting {{workflow.parameters.recovery-wait}}s for recovery..."
            sleep {{workflow.parameters.recovery-wait}}

            # Check cluster health
            READY=$(kubectl get kafka krafter -n kafka \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "Unknown")
            BROKERS=$(kubectl get pods -n kafka -l strimzi.io/component-type=kafka \
              --no-headers 2>/dev/null | grep -c Running || echo "0")

            RECOVERY_END=$(date +%s)
            RTO=$((RECOVERY_END - RECOVERY_START))

            echo "Phase: {{inputs.parameters.phase}}"
            echo "Kafka Ready: $READY"
            echo "Running brokers: $BROKERS"
            echo "Recovery check duration: ${RTO}s"

            if [ "$READY" != "True" ]; then
              echo "WARNING: Kafka not ready after recovery wait!"
              exit 1
            fi

            # Check under-replicated partitions
            URP=$(kubectl exec -n kafka krafter-pool-alpha-0 -- kafka-topics.sh \
              --bootstrap-server localhost:9092 \
              --describe --under-replicated-partitions 2>&1 | wc -l)
            echo "Under-replicated partitions: $URP"

            echo "Recovery verified for {{inputs.parameters.phase}}"

    # Health check template
    - name: kafka-health-check
      inputs:
        parameters:
          - name: phase
      container:
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args:
          - -c
          - |
            echo "=== {{inputs.parameters.phase}} Health Check ==="
            READY=$(kubectl get kafka krafter -n kafka \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
            echo "Kafka Ready: $READY"

            kubectl get pods -n kafka -l strimzi.io/component-type=kafka --no-headers

            if [ "$READY" != "True" ]; then
              echo "ERROR: Kafka is not ready!"
              exit 1
            fi
            echo "Health check passed!"

    # Wait template
    - name: wait
      inputs:
        parameters:
          - name: duration
      container:
        image: busybox
        imagePullPolicy: IfNotPresent
        command: ["sleep"]
        args: ["{{inputs.parameters.duration}}"]

    # Final report
    - name: chaos-report
      container:
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args:
          - -c
          - |
            echo "========================================"
            echo "     KAFKA GAMEDAY CHAOS REPORT"
            echo "========================================"
            echo ""
            echo "Workflow: $HOSTNAME"
            echo "Date: $(date -Iseconds)"
            echo "Scenarios: {{workflow.parameters.scenarios}}"
            echo "Duration per scenario: {{workflow.parameters.chaos-duration}}s"
            echo "SLA RTO: {{workflow.parameters.sla-rto-sec}}s"
            echo "SLA Max Loss: {{workflow.parameters.sla-max-loss-pct}}%"
            echo ""
            echo "=== Final Cluster Status ==="
            kubectl get kafka krafter -n kafka \
              -o jsonpath='{.status}' | jq '.' 2>/dev/null || echo "Could not get status"
            echo ""
            echo "=== Broker Pod Status ==="
            kubectl get pods -n kafka -l strimzi.io/component-type=kafka
            echo ""
            echo "=== Under-Replicated Partitions ==="
            kubectl exec -n kafka krafter-pool-alpha-0 -- kafka-topics.sh \
              --bootstrap-server localhost:9092 \
              --describe --under-replicated-partitions 2>&1 || echo "N/A"
            echo ""
            echo "=== Recent Events ==="
            kubectl get events -n kafka --sort-by='.lastTimestamp' | tail -20
            echo ""
            echo "========================================"
            echo "         GAMEDAY COMPLETE"
            echo "========================================"
