kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      name: alpha
      kubeletExtraArgs:
        system-reserved: memory=1Gi
        kube-reserved: memory=1Gi
  labels:
    topology.kubernetes.io/zone: alpha
    node.kubernetes.io/instance-type: custom-4vcpu-10gb
    node.kubernetes.io/local-storage: 20gb
  extraMounts:
  - hostPath: proxy/proxy.conf
    containerPath: /etc/systemd/system/containerd.service.d/proxy.conf
    readOnly: true
- role: worker
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      name: sigma
      kubeletExtraArgs:
        system-reserved: memory=1Gi
        kube-reserved: memory=1Gi
  labels:
    topology.kubernetes.io/zone: sigma
    node.kubernetes.io/instance-type: custom-4vcpu-10gb
    node.kubernetes.io/local-storage: 20gb
  extraMounts:
  - hostPath: proxy/proxy.conf
    containerPath: /etc/systemd/system/containerd.service.d/proxy.conf
    readOnly: true
- role: worker
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      name: gamma
      kubeletExtraArgs:
        system-reserved: memory=1Gi
        kube-reserved: memory=1Gi
  labels:
    topology.kubernetes.io/zone: gamma
    node.kubernetes.io/instance-type: custom-4vcpu-10gb
    node.kubernetes.io/local-storage: 20gb
  extraMounts:
  - hostPath: proxy/proxy.conf
    containerPath: /etc/systemd/system/containerd.service.d/proxy.conf
    readOnly: true
