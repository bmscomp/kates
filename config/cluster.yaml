kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# Use a stable Kubernetes version (v1.31.4) to avoid cgroup v2 issues
# v1.35.0 has known kubelet health check issues with cgroup v2
featureGates:
  "KubeletCgroupDriverFromCRI": true
containerdConfigPatches:
- |-
  # Localhost registry mirror
  [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5001"]
    endpoint = ["http://kind-registry:5000"]
  [plugins."io.containerd.grpc.v1.cri".registry.configs."localhost:5001".tls]
    insecure_skip_verify = true
  
  # registry.k8s.io mirror - for Kubernetes images
  [plugins."io.containerd.grpc.v1.cri".registry.mirrors."registry.k8s.io"]
    endpoint = ["http://kind-registry:5000"]
  [plugins."io.containerd.grpc.v1.cri".registry.configs."registry.k8s.io".tls]
    insecure_skip_verify = true
  
  # quay.io mirror - for Prometheus, Strimzi, etc.
  [plugins."io.containerd.grpc.v1.cri".registry.mirrors."quay.io"]
    endpoint = ["http://kind-registry:5000"]
  [plugins."io.containerd.grpc.v1.cri".registry.configs."quay.io".tls]
    insecure_skip_verify = true
  
  # docker.io mirror - for Grafana, MongoDB, etc.
  [plugins."io.containerd.grpc.v1.cri".registry.mirrors."docker.io"]
    endpoint = ["http://kind-registry:5000"]
  [plugins."io.containerd.grpc.v1.cri".registry.configs."docker.io".tls]
    insecure_skip_verify = true
# Add cluster configuration to increase timeout
kubeadmConfigPatches:
- |
  kind: ClusterConfiguration
  apiServer:
    timeoutForControlPlane: 8m0s
nodes:
- role: control-plane
  # Use Kubernetes v1.31.4 instead of v1.35.0
  image: kindest/node:v1.31.4
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      name: alpha
      kubeletExtraArgs:
        cgroup-driver: systemd
        runtime-request-timeout: 15m
  labels:
    topology.kubernetes.io/zone: alpha
    node.kubernetes.io/instance-type: custom-3vcpu-6gb
    node.kubernetes.io/local-storage: 30gb
  extraMounts:
  - hostPath: proxy/proxy.conf
    containerPath: /etc/systemd/system/containerd.service.d/proxy.conf
    readOnly: true
- role: worker
  # Use Kubernetes v1.31.4 instead of v1.35.0
  image: kindest/node:v1.31.4
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      name: sigma
      kubeletExtraArgs:
        cgroup-driver: systemd
  labels:
    topology.kubernetes.io/zone: sigma
    node.kubernetes.io/instance-type: custom-3vcpu-6gb
    node.kubernetes.io/local-storage: 30gb
  extraMounts:
  - hostPath: proxy/proxy.conf
    containerPath: /etc/systemd/system/containerd.service.d/proxy.conf
    readOnly: true
- role: worker
  # Use Kubernetes v1.31.4 instead of v1.35.0
  image: kindest/node:v1.31.4
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      name: gamma
      kubeletExtraArgs:
        cgroup-driver: systemd
  labels:
    topology.kubernetes.io/zone: gamma
    node.kubernetes.io/instance-type: custom-3vcpu-6gb
    node.kubernetes.io/local-storage: 30gb
  extraMounts:
  - hostPath: proxy/proxy.conf
    containerPath: /etc/systemd/system/containerd.service.d/proxy.conf
    readOnly: true
