kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# Use a stable Kubernetes version (v1.31.4) to avoid cgroup v2 issues
# v1.33+ has known kubelet health check issues with cgroup v2 on arm64
featureGates:
  "KubeletCgroupDriverFromCRI": true
kubeadmConfigPatches:
- |
  kind: ClusterConfiguration
  apiServer:
    timeoutForControlPlane: 8m0s
nodes:
- role: control-plane
  # Use Kubernetes v1.31.4 — v1.33+ fails with cgroup v2 on arm64
  image: kindest/node:v1.31.4
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      name: alpha
      kubeletExtraArgs:
        cgroup-driver: systemd
        runtime-request-timeout: 15m
  labels:
    topology.kubernetes.io/zone: alpha
    node.kubernetes.io/instance-type: custom-3vcpu-6gb
    node.kubernetes.io/local-storage: 30gb
  extraMounts:
  - hostPath: proxy/proxy.conf
    containerPath: /etc/systemd/system/containerd.service.d/proxy.conf
    readOnly: true
- role: worker
  # Use Kubernetes v1.31.4 — v1.33+ fails with cgroup v2 on arm64
  image: kindest/node:v1.31.4
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      name: sigma
      kubeletExtraArgs:
        cgroup-driver: systemd
  labels:
    topology.kubernetes.io/zone: sigma
    node.kubernetes.io/instance-type: custom-3vcpu-6gb
    node.kubernetes.io/local-storage: 30gb
  extraMounts:
  - hostPath: proxy/proxy.conf
    containerPath: /etc/systemd/system/containerd.service.d/proxy.conf
    readOnly: true
- role: worker
  # Use Kubernetes v1.31.4 — v1.33+ fails with cgroup v2 on arm64
  image: kindest/node:v1.31.4
  kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    nodeRegistration:
      name: gamma
      kubeletExtraArgs:
        cgroup-driver: systemd
  labels:
    topology.kubernetes.io/zone: gamma
    node.kubernetes.io/instance-type: custom-3vcpu-6gb
    node.kubernetes.io/local-storage: 30gb
  extraMounts:
  - hostPath: proxy/proxy.conf
    containerPath: /etc/systemd/system/containerd.service.d/proxy.conf
    readOnly: true
