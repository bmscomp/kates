# Kates Monitoring — Default Values
# Wraps kube-prometheus-stack with Kates-specific dashboards and config

kube-prometheus-stack:
  enabled: true

  grafana:
    adminPassword: "admin"
    image:
      tag: "12.3.1"
      pullPolicy: IfNotPresent
    service:
      type: NodePort
      nodePort: 30080
    sidecar:
      image:
        tag: "2.2.3"
        pullPolicy: IfNotPresent
      imagePullPolicy: IfNotPresent
      dashboards:
        enabled: true
      datasources:
        enabled: true

  prometheus:
    prometheusSpec:
      image:
        tag: v3.9.1
        pullPolicy: IfNotPresent
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi

  global:
    imagePullPolicy: IfNotPresent

  prometheusOperator:
    image:
      tag: v0.79.2
      pullPolicy: IfNotPresent
    prometheusConfigReloader:
      image:
        tag: v0.79.2
        pullPolicy: IfNotPresent
    admissionWebhooks:
      patch:
        image:
          pullPolicy: IfNotPresent

  alertmanager:
    alertmanagerSpec:
      image:
        tag: v0.28.1
        pullPolicy: IfNotPresent

  kube-state-metrics:
    image:
      tag: v2.14.0
      pullPolicy: IfNotPresent

  prometheus-node-exporter:
    image:
      tag: v1.8.2
      pullPolicy: IfNotPresent

  admissionWebhooks:
    enabled: true
    deployment:
      image:
        tag: v0.79.2
        pullPolicy: IfNotPresent
    patch:
      enabled: true
      image:
        tag: v1.6.5
        pullPolicy: IfNotPresent

  defaultRules:
    create: true

  kubelet:
    enabled: true

# Kates dashboards
dashboards:
  enabled: true
  labels:
    grafana_dashboard: "1"
