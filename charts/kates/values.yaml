replicaCount: 1

image:
  repository: kates
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automount: true

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 8080
  nodePort: ""
  appProtocol: http
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  certManager:
    enabled: false
    issuerName: ""
    issuerKind: ClusterIssuer
  hosts:
    - host: kates.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

terminationGracePeriodSeconds: 60

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ""
  customMetrics: []
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60

podDisruptionBudget:
  enabled: false
  minAvailable: ""
  maxUnavailable: 1
  unhealthyPodEvictionPolicy: IfHealthy

topologySpreadConstraints: []

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
extraVolumes: []
extraVolumeMounts: []

initContainers:
  waitForPostgres:
    image: busybox:1.36
    pullPolicy: IfNotPresent

kafka:
  bootstrapServers: "krafter-kafka-bootstrap.kafka.svc:9092"

trogdor:
  coordinatorUrl: "http://trogdor-coordinator.kafka.svc:8889"

engine:
  defaultBackend: "native"

networkPolicy:
  enabled: false
  ingressRules:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
  egressRules: []

metrics:
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: "30s"
    scrapeTimeout: ""
    labels: {}
    metricRelabelings: []
    relabelings: []
  prometheusRule:
    enabled: false
    namespace: ""
    labels: {}
    rules:
      - alert: KatesDown
        expr: up{job="{{ include \"kates.fullname\" . }}"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "KATES instance is down"
          description: "KATES pod {{ $labels.pod }} has been down for more than 5 minutes."
      - alert: KatesHighErrorRate
        expr: rate(http_server_requests_seconds_count{job="{{ include \"kates.fullname\" . }}", status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "KATES high error rate"
          description: "KATES is returning more than 10% 5xx responses."
  grafanaDashboard:
    enabled: false
    labels:
      grafana_dashboard: "1"

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  auth:
    database: kates
    username: kates
    password: kates
    existingSecret: ""
    passwordKey: "password"
  storage:
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  securityContext:
    runAsNonRoot: true
    runAsUser: 999
    fsGroup: 999
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

externalDatabase:
  enabled: false
  host: ""
  port: 5432
  database: kates
  username: kates
  password: ""
  existingSecret: ""
  passwordKey: "password"

defaults:
  replicationFactor: "3"
  partitions: "3"
  minInsyncReplicas: "2"
  acks: "all"
  batchSize: "65536"
  lingerMs: "5"
  compressionType: "lz4"
  recordSize: "1024"
  numRecords: "1000000"
  throughput: "-1"
  durationMs: "600000"
  numProducers: "1"
  numConsumers: "1"

tests:
  load:
    partitions: "3"
    batchSize: "65536"
    lingerMs: "5"
    numRecords: "1000000"
    durationMs: "600000"
    numProducers: "1"
  stress:
    partitions: "6"
    batchSize: "131072"
    lingerMs: "10"
    numRecords: "5000000"
    durationMs: "900000"
    numProducers: "3"
  spike:
    acks: "1"
    batchSize: "131072"
    lingerMs: "0"
    compressionType: "none"
    numRecords: "2000000"
    durationMs: "300000"
  endurance:
    numRecords: "10000000"
    throughput: "5000"
    durationMs: "3600000"
  volume:
    partitions: "6"
    batchSize: "262144"
    lingerMs: "50"
    recordSize: "10240"
    numRecords: "2000000"
  capacity:
    partitions: "12"
    batchSize: "131072"
    lingerMs: "10"
    numRecords: "10000000"
    durationMs: "1200000"
    numProducers: "5"
  roundtrip:
    batchSize: "16384"
    lingerMs: "0"
    compressionType: "none"
    numRecords: "500000"
    throughput: "10000"

backup:
  enabled: false
  schedule: "0 2 * * *"
  image: postgres:16-alpine
  retention: 7
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"

migration:
  enabled: false
  image: ""
  command: []

cleanup:
  enabled: false
  schedule: "0 4 * * 0"
  retentionDays: 30
  image: curlimages/curl:8.7.1
