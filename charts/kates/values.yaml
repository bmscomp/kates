replicaCount: 1

image:
  repository: kates
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automount: true

podAnnotations: {}

service:
  type: ClusterIP
  port: 8080
  nodePort: ""
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: kates.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ""

podDisruptionBudget:
  enabled: false
  minAvailable: ""
  maxUnavailable: 1

nodeSelector: {}
tolerations: []
affinity: {}

kafka:
  bootstrapServers: "krafter-kafka-bootstrap.kafka.svc:9092"

trogdor:
  coordinatorUrl: "http://trogdor-coordinator.kafka.svc:8889"

engine:
  defaultBackend: "native"

metrics:
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: "30s"
    scrapeTimeout: ""
    labels: {}

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  auth:
    database: kates
    username: kates
    password: kates
  storage:
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"

externalDatabase:
  enabled: false
  host: ""
  port: 5432
  database: kates
  username: kates
  password: ""

defaults:
  replicationFactor: "3"
  partitions: "3"
  minInsyncReplicas: "2"
  acks: "all"
  batchSize: "65536"
  lingerMs: "5"
  compressionType: "lz4"
  recordSize: "1024"
  numRecords: "1000000"
  throughput: "-1"
  durationMs: "600000"
  numProducers: "1"
  numConsumers: "1"

tests:
  load:
    partitions: "3"
    batchSize: "65536"
    lingerMs: "5"
    numRecords: "1000000"
    durationMs: "600000"
    numProducers: "1"
  stress:
    partitions: "6"
    batchSize: "131072"
    lingerMs: "10"
    numRecords: "5000000"
    durationMs: "900000"
    numProducers: "3"
  spike:
    acks: "1"
    batchSize: "131072"
    lingerMs: "0"
    compressionType: "none"
    numRecords: "2000000"
    durationMs: "300000"
  endurance:
    numRecords: "10000000"
    throughput: "5000"
    durationMs: "3600000"
  volume:
    partitions: "6"
    batchSize: "262144"
    lingerMs: "50"
    recordSize: "10240"
    numRecords: "2000000"
  capacity:
    partitions: "12"
    batchSize: "131072"
    lingerMs: "10"
    numRecords: "10000000"
    durationMs: "1200000"
    numProducers: "5"
  roundtrip:
    batchSize: "16384"
    lingerMs: "0"
    compressionType: "none"
    numRecords: "500000"
    throughput: "10000"
