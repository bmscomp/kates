# Development overrides — single-replica, minimal resources
replicaCount: 1

image:
  pullPolicy: IfNotPresent

resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

jvm:
  options: "-Xms256m -Xmx512m -XX:+UseZGC"

probes:
  startup:
    failureThreshold: 60
    periodSeconds: 2
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 5
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 15

postgresql:
  enabled: true
  storage:
    size: 512Mi

defaults:
  replicationFactor: "1"
  partitions: "1"
  minInsyncReplicas: "1"
