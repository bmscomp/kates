  KATES_TESTS_VOLUME_RECORD_SIZE: {{ .Values.tests.volume.recordSize | default .Values.defaults.recordSize | quote }}
  KATES_TESTS_VOLUME_NUM_RECORDS: {{ .Values.tests.volume.numRecords | default .Values.defaults.numRecords | quote }}
  KATES_TESTS_VOLUME_THROUGHPUT: {{ .Values.tests.volume.throughput | default .Values.defaults.throughput | quote }}
  KATES_TESTS_VOLUME_DURATION_MS: {{ .Values.tests.volume.durationMs | default .Values.defaults.durationMs | quote }}
  KATES_TESTS_VOLUME_NUM_PRODUCERS: {{ .Values.tests.volume.numProducers | default .Values.defaults.numProducers | quote }}
  KATES_TESTS_VOLUME_NUM_CONSUMERS: {{ .Values.tests.volume.numConsumers | default .Values.defaults.numConsumers | quote }}

  KATES_TESTS_CAPACITY_REPLICATION_FACTOR: {{ .Values.tests.capacity.replicationFactor | default .Values.defaults.replicationFactor | quote }}
  KATES_TESTS_CAPACITY_PARTITIONS: {{ .Values.tests.capacity.partitions | default .Values.defaults.partitions | quote }}
  KATES_TESTS_CAPACITY_MIN_INSYNC_REPLICAS: {{ .Values.tests.capacity.minInsyncReplicas | default .Values.defaults.minInsyncReplicas | quote }}
  KATES_TESTS_CAPACITY_ACKS: {{ .Values.tests.capacity.acks | default .Values.defaults.acks | quote }}
  KATES_TESTS_CAPACITY_BATCH_SIZE: {{ .Values.tests.capacity.batchSize | default .Values.defaults.batchSize | quote }}
  KATES_TESTS_CAPACITY_LINGER_MS: {{ .Values.tests.capacity.lingerMs | default .Values.defaults.lingerMs | quote }}
  KATES_TESTS_CAPACITY_COMPRESSION_TYPE: {{ .Values.tests.capacity.compressionType | default .Values.defaults.compressionType | quote }}
  KATES_TESTS_CAPACITY_RECORD_SIZE: {{ .Values.tests.capacity.recordSize | default .Values.defaults.recordSize | quote }}
  KATES_TESTS_CAPACITY_NUM_RECORDS: {{ .Values.tests.capacity.numRecords | default .Values.defaults.numRecords | quote }}
  KATES_TESTS_CAPACITY_THROUGHPUT: {{ .Values.tests.capacity.throughput | default .Values.defaults.throughput | quote }}
  KATES_TESTS_CAPACITY_DURATION_MS: {{ .Values.tests.capacity.durationMs | default .Values.defaults.durationMs | quote }}
  KATES_TESTS_CAPACITY_NUM_PRODUCERS: {{ .Values.tests.capacity.numProducers | default .Values.defaults.numProducers | quote }}
  KATES_TESTS_CAPACITY_NUM_CONSUMERS: {{ .Values.tests.capacity.numConsumers | default .Values.defaults.numConsumers | quote }}

  KATES_TESTS_ROUNDTRIP_REPLICATION_FACTOR: {{ .Values.tests.roundtrip.replicationFactor | default .Values.defaults.replicationFactor | quote }}
  KATES_TESTS_ROUNDTRIP_PARTITIONS: {{ .Values.tests.roundtrip.partitions | default .Values.defaults.partitions | quote }}
  KATES_TESTS_ROUNDTRIP_MIN_INSYNC_REPLICAS: {{ .Values.tests.roundtrip.minInsyncReplicas | default .Values.defaults.minInsyncReplicas | quote }}
  KATES_TESTS_ROUNDTRIP_ACKS: {{ .Values.tests.roundtrip.acks | default .Values.defaults.acks | quote }}
  KATES_TESTS_ROUNDTRIP_BATCH_SIZE: {{ .Values.tests.roundtrip.batchSize | default .Values.defaults.batchSize | quote }}
  KATES_TESTS_ROUNDTRIP_LINGER_MS: {{ .Values.tests.roundtrip.lingerMs | default .Values.defaults.lingerMs | quote }}
  KATES_TESTS_ROUNDTRIP_COMPRESSION_TYPE: {{ .Values.tests.roundtrip.compressionType | default .Values.defaults.compressionType | quote }}
  KATES_TESTS_ROUNDTRIP_RECORD_SIZE: {{ .Values.tests.roundtrip.recordSize | default .Values.defaults.recordSize | quote }}
  KATES_TESTS_ROUNDTRIP_NUM_RECORDS: {{ .Values.tests.roundtrip.numRecords | default .Values.defaults.numRecords | quote }}
