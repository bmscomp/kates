  KATES_TESTS_STRESS_RECORD_SIZE: {{ .Values.tests.stress.recordSize | default .Values.defaults.recordSize | quote }}
  KATES_TESTS_STRESS_NUM_RECORDS: {{ .Values.tests.stress.numRecords | default .Values.defaults.numRecords | quote }}
  KATES_TESTS_STRESS_THROUGHPUT: {{ .Values.tests.stress.throughput | default .Values.defaults.throughput | quote }}
  KATES_TESTS_STRESS_DURATION_MS: {{ .Values.tests.stress.durationMs | default .Values.defaults.durationMs | quote }}
  KATES_TESTS_STRESS_NUM_PRODUCERS: {{ .Values.tests.stress.numProducers | default .Values.defaults.numProducers | quote }}
  KATES_TESTS_STRESS_NUM_CONSUMERS: {{ .Values.tests.stress.numConsumers | default .Values.defaults.numConsumers | quote }}

  KATES_TESTS_SPIKE_REPLICATION_FACTOR: {{ .Values.tests.spike.replicationFactor | default .Values.defaults.replicationFactor | quote }}
  KATES_TESTS_SPIKE_PARTITIONS: {{ .Values.tests.spike.partitions | default .Values.defaults.partitions | quote }}
  KATES_TESTS_SPIKE_MIN_INSYNC_REPLICAS: {{ .Values.tests.spike.minInsyncReplicas | default .Values.defaults.minInsyncReplicas | quote }}
  KATES_TESTS_SPIKE_ACKS: {{ .Values.tests.spike.acks | default .Values.defaults.acks | quote }}
  KATES_TESTS_SPIKE_BATCH_SIZE: {{ .Values.tests.spike.batchSize | default .Values.defaults.batchSize | quote }}
  KATES_TESTS_SPIKE_LINGER_MS: {{ .Values.tests.spike.lingerMs | default .Values.defaults.lingerMs | quote }}
  KATES_TESTS_SPIKE_COMPRESSION_TYPE: {{ .Values.tests.spike.compressionType | default .Values.defaults.compressionType | quote }}
  KATES_TESTS_SPIKE_RECORD_SIZE: {{ .Values.tests.spike.recordSize | default .Values.defaults.recordSize | quote }}
  KATES_TESTS_SPIKE_NUM_RECORDS: {{ .Values.tests.spike.numRecords | default .Values.defaults.numRecords | quote }}
  KATES_TESTS_SPIKE_THROUGHPUT: {{ .Values.tests.spike.throughput | default .Values.defaults.throughput | quote }}
  KATES_TESTS_SPIKE_DURATION_MS: {{ .Values.tests.spike.durationMs | default .Values.defaults.durationMs | quote }}
  KATES_TESTS_SPIKE_NUM_PRODUCERS: {{ .Values.tests.spike.numProducers | default .Values.defaults.numProducers | quote }}
  KATES_TESTS_SPIKE_NUM_CONSUMERS: {{ .Values.tests.spike.numConsumers | default .Values.defaults.numConsumers | quote }}

  KATES_TESTS_ENDURANCE_REPLICATION_FACTOR: {{ .Values.tests.endurance.replicationFactor | default .Values.defaults.replicationFactor | quote }}
  KATES_TESTS_ENDURANCE_PARTITIONS: {{ .Values.tests.endurance.partitions | default .Values.defaults.partitions | quote }}
  KATES_TESTS_ENDURANCE_MIN_INSYNC_REPLICAS: {{ .Values.tests.endurance.minInsyncReplicas | default .Values.defaults.minInsyncReplicas | quote }}
  KATES_TESTS_ENDURANCE_ACKS: {{ .Values.tests.endurance.acks | default .Values.defaults.acks | quote }}
  KATES_TESTS_ENDURANCE_BATCH_SIZE: {{ .Values.tests.endurance.batchSize | default .Values.defaults.batchSize | quote }}
  KATES_TESTS_ENDURANCE_LINGER_MS: {{ .Values.tests.endurance.lingerMs | default .Values.defaults.lingerMs | quote }}
  KATES_TESTS_ENDURANCE_COMPRESSION_TYPE: {{ .Values.tests.endurance.compressionType | default .Values.defaults.compressionType | quote }}
  KATES_TESTS_ENDURANCE_RECORD_SIZE: {{ .Values.tests.endurance.recordSize | default .Values.defaults.recordSize | quote }}
  KATES_TESTS_ENDURANCE_NUM_RECORDS: {{ .Values.tests.endurance.numRecords | default .Values.defaults.numRecords | quote }}
  KATES_TESTS_ENDURANCE_THROUGHPUT: {{ .Values.tests.endurance.throughput | default .Values.defaults.throughput | quote }}
  KATES_TESTS_ENDURANCE_DURATION_MS: {{ .Values.tests.endurance.durationMs | default .Values.defaults.durationMs | quote }}
  KATES_TESTS_ENDURANCE_NUM_PRODUCERS: {{ .Values.tests.endurance.numProducers | default .Values.defaults.numProducers | quote }}
  KATES_TESTS_ENDURANCE_NUM_CONSUMERS: {{ .Values.tests.endurance.numConsumers | default .Values.defaults.numConsumers | quote }}

  KATES_TESTS_VOLUME_REPLICATION_FACTOR: {{ .Values.tests.volume.replicationFactor | default .Values.defaults.replicationFactor | quote }}
  KATES_TESTS_VOLUME_PARTITIONS: {{ .Values.tests.volume.partitions | default .Values.defaults.partitions | quote }}
  KATES_TESTS_VOLUME_MIN_INSYNC_REPLICAS: {{ .Values.tests.volume.minInsyncReplicas | default .Values.defaults.minInsyncReplicas | quote }}
