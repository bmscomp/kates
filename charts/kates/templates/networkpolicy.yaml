{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kates.fullname" . }}
  labels:
    {{- include "kates.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kates.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- with .Values.networkPolicy.ingressRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- if .Values.postgresql.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "kates.postgresql.fullname" . }}
              app.kubernetes.io/component: database
      ports:
        - port: 5432
          protocol: TCP
    {{- end }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.kafka.namespace | default "kafka" }}
      ports:
        - port: {{ .Values.networkPolicy.kafka.port | default 9092 }}
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.prometheus.namespace | default "monitoring" }}
      ports:
        - port: {{ .Values.networkPolicy.prometheus.port | default 9090 }}
          protocol: TCP
    {{- with .Values.networkPolicy.egressRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
