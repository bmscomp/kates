{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kates.fullname" . }}
  labels:
    {{- include "kates.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kates.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- with .Values.networkPolicy.ingressRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- if .Values.postgresql.enabled }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "kates.postgresql.fullname" . }}
              app.kubernetes.io/component: database
      ports:
        - port: 5432
          protocol: TCP
    {{- end }}
    {{- if .Values.externalDatabase.enabled }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: {{ .Values.externalDatabase.port | default 5432 }}
          protocol: TCP
    {{- end }}
    - to:
        - namespaceSelector: {}
      ports:
        - port: {{ .Values.networkPolicy.kafka.port | default 9092 }}
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.prometheus.namespace | default "monitoring" }}
      ports:
        - port: {{ .Values.networkPolicy.prometheus.port | default 9090 }}
          protocol: TCP
    {{- with .Values.networkPolicy.egressRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}

{{- if and .Values.networkPolicy.enabled .Values.postgresql.enabled (not .Values.postgresql.useSubchart) }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kates.postgresql.fullname" . }}
  labels:
    {{- include "kates.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kates.postgresql.fullname" . }}
      app.kubernetes.io/component: database
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchLabels:
              {{- include "kates.selectorLabels" . | nindent 14 }}
      ports:
        - port: 5432
          protocol: TCP
{{- end }}
