{{- $createSecret := false -}}
{{- if .Values.postgresql.enabled -}}
  {{- if not .Values.postgresql.auth.existingSecret -}}
    {{- $createSecret = true -}}
  {{- end -}}
{{- else if .Values.externalDatabase.enabled -}}
  {{- if not .Values.externalDatabase.existingSecret -}}
    {{- $createSecret = true -}}
  {{- end -}}
{{- end -}}
{{- if $createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kates.fullname" . }}-db
  labels:
    {{- include "kates.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.postgresql.enabled }}
  QUARKUS_DATASOURCE_USERNAME: {{ .Values.postgresql.auth.username | quote }}
  QUARKUS_DATASOURCE_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  {{- else if .Values.externalDatabase.enabled }}
  QUARKUS_DATASOURCE_USERNAME: {{ .Values.externalDatabase.username | quote }}
  QUARKUS_DATASOURCE_PASSWORD: {{ .Values.externalDatabase.password | quote }}
  {{- end }}
{{- end }}
