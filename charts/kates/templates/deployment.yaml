apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kates.fullname" . }}
  labels:
    {{- include "kates.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kates.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kates.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "kates.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 60 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
      - name: wait-for-postgres
        image: {{ .Values.initContainers.waitForPostgres.image | quote }}
        imagePullPolicy: {{ .Values.initContainers.waitForPostgres.pullPolicy | default "IfNotPresent" }}
        command: ['sh', '-c', 'until nc -z {{ include "kates.postgresql.fullname" . }} 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done']
        {{- with .Values.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      {{- end }}
      containers:
      - name: kates
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- with .Values.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        ports:
        - containerPort: {{ .Values.service.port }}
          name: http
          protocol: TCP
        - containerPort: {{ .Values.grpc.port }}
          name: grpc
          protocol: TCP
        envFrom:
        - configMapRef:
            name: {{ include "kates.fullname" . }}-config
        {{- if or .Values.postgresql.enabled .Values.externalDatabase.enabled }}
        - secretRef:
            name: {{ include "kates.dbSecretName" . }}
        {{- end }}
        env:
        {{- if .Values.kafka.clientRack }}
        - name: KATES_KAFKA_CLIENT_RACK
          value: {{ .Values.kafka.clientRack | quote }}
        {{- end }}
        {{- if .Values.kafka.sasl.enabled }}
        {{- if and .Values.kafka.sasl.secretName (ne .Values.kafka.sasl.mechanism "OAUTHBEARER") }}
        - name: KATES_KAFKA_SASL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.kafka.sasl.secretName }}
              key: {{ .Values.kafka.sasl.secretKey }}
        {{- end }}
        {{- if eq .Values.kafka.sasl.mechanism "OAUTHBEARER" }}
        {{- if .Values.kafka.sasl.oauthbearer.clientSecretName }}
        - name: KATES_KAFKA_SASL_OAUTHBEARER_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.kafka.sasl.oauthbearer.clientSecretName }}
              key: {{ .Values.kafka.sasl.oauthbearer.clientSecretKey }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if .Values.kafka.ssl.enabled }}
        {{- if .Values.kafka.ssl.truststore.password }}
        - name: KATES_KAFKA_SSL_TRUSTSTORE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "kates.fullname" . }}-kafka-ssl
              key: truststore-password
        {{- end }}
        {{- if .Values.kafka.ssl.keystore.password }}
        - name: KATES_KAFKA_SSL_KEYSTORE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "kates.fullname" . }}-kafka-ssl
              key: keystore-password
        {{- end }}
        {{- end }}
        {{- if .Values.jvm.options }}
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.jvm.options | quote }}
        {{- end }}
        {{- if .Values.apiKey.enabled }}
        - name: KATES_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.apiKey.existingSecret | default (printf "%s-api-key" (include "kates.fullname" .)) }}
              key: {{ .Values.apiKey.secretKey | default "api-key" }}
        {{- end }}
        {{- with .Values.extraEnv }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        {{- if and .Values.kafka.ssl.enabled .Values.kafka.ssl.truststore.secretName }}
        - name: kafka-truststore
          mountPath: /etc/kafka/ssl/truststore
          readOnly: true
        {{- end }}
        {{- if and .Values.kafka.ssl.enabled .Values.kafka.ssl.keystore.secretName }}
        - name: kafka-keystore
          mountPath: /etc/kafka/ssl/keystore
          readOnly: true
        {{- end }}
        {{- with .Values.extraVolumeMounts }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        startupProbe:
          httpGet:
            path: {{ .Values.probes.startup.path | default "/q/health/started" }}
            port: http
          failureThreshold: {{ .Values.probes.startup.failureThreshold | default 30 }}
          periodSeconds: {{ .Values.probes.startup.periodSeconds | default 2 }}
        readinessProbe:
          httpGet:
            path: {{ .Values.probes.readiness.path | default "/api/health" }}
            port: http
          initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds | default 5 }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds | default 10 }}
        livenessProbe:
          httpGet:
            path: {{ .Values.probes.liveness.path | default "/q/health/live" }}
            port: http
          initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds | default 15 }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds | default 30 }}
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep {{ .Values.lifecycle.preStopSleepSeconds | default 5 }}"]
      volumes:
      - name: tmp
        emptyDir: {}
      {{- if and .Values.kafka.ssl.enabled .Values.kafka.ssl.truststore.secretName }}
      - name: kafka-truststore
        secret:
          secretName: {{ .Values.kafka.ssl.truststore.secretName }}
      {{- end }}
      {{- if and .Values.kafka.ssl.enabled .Values.kafka.ssl.keystore.secretName }}
      - name: kafka-keystore
        secret:
          secretName: {{ .Values.kafka.ssl.keystore.secretName }}
      {{- end }}
      {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
