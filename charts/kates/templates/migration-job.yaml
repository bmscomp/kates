{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kates.fullname" . }}-migrate
  labels:
    {{- include "kates.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migration.backoffLimit | default 3 }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds | default 600 }}
  template:
    metadata:
      labels:
        {{- include "kates.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
      - name: wait-for-postgres
        image: {{ .Values.initContainers.waitForPostgres.image | quote }}
        imagePullPolicy: {{ .Values.initContainers.waitForPostgres.pullPolicy | default "IfNotPresent" }}
        command: ['sh', '-c', 'until nc -z {{ include "kates.postgresql.fullname" . }} 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done']
        {{- with .Values.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "32Mi"
            cpu: "50m"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      {{- end }}
      containers:
      - name: migrate
        image: {{ .Values.migration.image | default (printf "%s:%s" .Values.image.repository .Values.image.tag) | quote }}
        {{- if .Values.migration.command }}
        command:
          {{- toYaml .Values.migration.command | nindent 10 }}
        {{- else }}
        env:
        - name: QUARKUS_FLYWAY_MIGRATE_AT_START
          value: "true"
        - name: QUARKUS_FLYWAY_BASELINE_ON_MIGRATE
          value: "true"
        - name: QUARKUS_HTTP_PORT
          value: "0"
        command:
          - sh
          - -c
          - |
            echo "Running Flyway migrations..."
            java -Dquarkus.flyway.migrate-at-start=true \
                 -Dquarkus.flyway.baseline-on-migrate=true \
                 -Dquarkus.http.host=localhost \
                 -Dquarkus.http.port=0 \
                 -jar /deployments/quarkus-run.jar &
            PID=$!
            sleep 30
            echo "Migration window complete, checking..."
            kill $PID 2>/dev/null || true
            echo "Migration Job finished."
        {{- end }}
        envFrom:
        - configMapRef:
            name: {{ include "kates.fullname" . }}-config
        {{- if or .Values.postgresql.enabled .Values.externalDatabase.enabled }}
        - secretRef:
            name: {{ include "kates.dbSecretName" . }}
        {{- end }}
        {{- with .Values.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          {{- if .Values.migration.resources }}
          {{- toYaml .Values.migration.resources | nindent 10 }}
          {{- else }}
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
          {{- end }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
{{- end }}
