apiVersion: v1
kind: Service
metadata:
  name: {{ include "kates.fullname" . }}
  labels:
    {{- include "kates.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "kates.selectorLabels" . | nindent 4 }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 8080
    protocol: TCP
    name: http
    {{- if .Values.service.appProtocol }}
    appProtocol: {{ .Values.service.appProtocol }}
    {{- end }}
    {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
    nodePort: {{ .Values.service.nodePort }}
    {{- end }}
  - port: {{ .Values.grpc.port | default 9000 }}
    targetPort: 9000
    protocol: TCP
    name: grpc
    {{- if and (eq .Values.service.type "NodePort") .Values.grpc.nodePort }}
    nodePort: {{ .Values.grpc.nodePort }}
    {{- end }}
