image:
  pullPolicy: Always

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: "50%"
  maxUnavailable: ""

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: kates

networkPolicy:
  enabled: true

lifecycle:
  preStopSleepSeconds: 10

terminationGracePeriodSeconds: 90

metrics:
  serviceMonitor:
    enabled: true
    interval: "15s"
  prometheusRule:
    enabled: true
  grafanaDashboard:
    enabled: true

postgresql:
  enabled: false

externalDatabase:
  enabled: true

backup:
  enabled: true
  schedule: "0 1 * * *"
  retention: 30
  persistence:
    enabled: true
    size: 50Gi

cleanup:
  enabled: true
  schedule: "0 3 * * 0"
  retentionDays: 90

defaults:
  replicationFactor: "3"
  partitions: "6"
  minInsyncReplicas: "2"
