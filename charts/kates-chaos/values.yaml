# Kates Chaos Engineering — Default Values
# Wraps LitmusChaos with Kafka/Kates-specific chaos infrastructure

# Global settings
global:
  imagePullPolicy: IfNotPresent

# Upstream Litmus chart
litmus:
  enabled: true
  adminConfig:
    ADMIN_USERNAME: admin
    ADMIN_PASSWORD: ""
    DBUSER: admin
    DBPASSWORD: ""
    JWT_SECRET: ""
  existingSecret: ""
  mongodb:
    enabled: true
    image:
      registry: docker.io
      repository: bitnamilegacy/mongodb
      tag: "8.0.13-debian-12-r0"
    architecture: replicaset
    replicaCount: 1
    arbiter:
      enabled: false
    auth:
      enabled: true
      rootPassword: ""
    volumePermissions:
      enabled: false
    persistence:
      enabled: true
      size: 5Gi
      storageClass: ""

# Authentication — managed by kates-chaos
# Credentials are auto-generated if left empty and stored in a persistent Secret
# To use a pre-existing Secret, set auth.existingSecret to its name
auth:
  adminPassword: ""
  dbRootPassword: ""
  jwtSecret: ""
  existingSecret: ""

# RBAC for chaos experiments in target namespaces
rbac:
  enabled: true
  kafkaNamespace: kafka
  katesNamespace: kates

# Prometheus monitoring integration
monitoring:
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}
  grafanaDashboard:
    enabled: false
    labels:
      grafana_dashboard: "1"

# ChaosExperiment definitions (deployed via post-install Job)
experiments:
  enabled: true
  image: registry.k8s.io/kubectl:v1.33.0
  definitions:
    - name: pod-delete
      scope: Namespaced
    - name: pod-cpu-hog
      scope: Namespaced
    - name: pod-memory-hog
      scope: Namespaced
    - name: pod-network-partition
      scope: Namespaced
    - name: pod-io-stress
      scope: Namespaced
    - name: pod-dns-error
      scope: Namespaced
    - name: node-drain
      scope: Cluster

# ChaosEngine automation (Phase 3)
engines: {}

# PodDisruptionBudgets
pdb:
  enabled: false

# Network policies
networkPolicies:
  enabled: false

# GameDay validation (trigger: --set gameday.enabled=true)
gameday:
  enabled: false

# External MongoDB for arm64 environments (Apple Silicon / Graviton)
# Enable this and disable litmus.mongodb when bitnamilegacy/mongodb (amd64-only)
# is not available for your architecture.
externalMongodb:
  enabled: false
  serviceName: chaos-mongodb-external
  image:
    repository: docker.io/library/mongo
    tag: "6.0"
    pullPolicy: IfNotPresent
  auth:
    rootUser: root
    rootPassword: "1234"
  resources: {}
  persistence:
    size: 2Gi
