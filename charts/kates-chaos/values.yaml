
# Kates Chaos Engineering — Default Values
# Wraps LitmusChaos with Kafka/Kates-specific chaos infrastructure

# Global settings
global:
  imagePullPolicy: IfNotPresent

# Upstream Litmus execution plane (Chaos Operator + CRDs)
litmus-core:
  enabled: true
  operator:
    image:
      repository: litmuschaos.docker.scarf.sh/litmuschaos/chaos-operator
      tag: 3.28.0
  runner:
    image:
      repository: litmuschaos.docker.scarf.sh/litmuschaos/chaos-runner
      tag: 3.28.0

# RBAC for chaos experiments in target namespaces
rbac:
  enabled: true
  kafkaNamespace: kafka
  katesNamespace: kates

# Prometheus monitoring integration
monitoring:
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}
  grafanaDashboard:
    enabled: false
    labels:
      grafana_dashboard: "1"

# ChaosExperiment definitions (deployed via post-install Job)
experiments:
  enabled: true
  image: registry.k8s.io/kubectl:v1.33.0
  definitions:
    - name: pod-delete
      scope: Namespaced
    - name: pod-cpu-hog
      scope: Namespaced
    - name: pod-memory-hog
      scope: Namespaced
    - name: pod-network-partition
      scope: Namespaced
    - name: pod-io-stress
      scope: Namespaced
    - name: pod-dns-error
      scope: Namespaced
    - name: node-drain
      scope: Cluster

# ChaosEngine automation (Phase 3)
engines: {}

# PodDisruptionBudgets
pdb:
  enabled: false

# Kyverno pod security policies (requires Kyverno controller in cluster)
kyvernoPolicy:
  enabled: false          # opt-in by default
  action: Audit           # Audit | Enforce
  mutate: true            # auto-inject security contexts on pod admission
  excludeContainers: []   # container names to skip during mutation

# Network policies
networkPolicies:
  enabled: false

# GameDay validation (trigger: --set gameday.enabled=true)
gameday:
  enabled: false


