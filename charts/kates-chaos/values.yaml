# Kates Chaos Engineering — Default Values
# Wraps LitmusChaos with Kafka/Kates-specific chaos infrastructure

# Global settings
global:
  imagePullPolicy: IfNotPresent

# Upstream Litmus chart
litmus:
  enabled: true
  mongodb:
    enabled: true
    image:
      registry: docker.io
      repository: bitnami/mongodb
      tag: "7.0.28"
    architecture: replicaset
    replicaCount: 1
    arbiter:
      enabled: false
    volumePermissions:
      enabled: false
    persistence:
      enabled: true
      size: 5Gi
      storageClass: ""

# Authentication
auth:
  adminPassword: ""
  existingSecret: ""
  secretKey: admin-password

# RBAC for chaos experiments in target namespaces
rbac:
  enabled: true
  kafkaNamespace: kafka
  katesNamespace: kates

# Prometheus monitoring integration
monitoring:
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}
  grafanaDashboard:
    enabled: false
    labels:
      grafana_dashboard: "1"

# ChaosExperiment definitions (deployed via post-install Job)
experiments:
  enabled: true
  image: bitnami/kubectl:latest
  definitions:
    - name: pod-delete
      scope: Namespaced
    - name: pod-cpu-hog
      scope: Namespaced
    - name: pod-memory-hog
      scope: Namespaced
    - name: pod-network-partition
      scope: Namespaced
    - name: pod-io-stress
      scope: Namespaced
    - name: pod-dns-error
      scope: Namespaced
    - name: node-drain
      scope: Cluster

# ChaosEngine automation (Phase 3)
engines: {}

# PodDisruptionBudgets
pdb:
  enabled: false

# Network policies
networkPolicies:
  enabled: false

# GameDay validation (trigger: --set gameday.enabled=true)
gameday:
  enabled: false
