# Kates Chaos — Kind Cluster Overlay
# Optimized for single-node Kind with pre-loaded images

litmus:
  enabled: true
  adminConfig:
    ADMIN_USERNAME: admin
    ADMIN_PASSWORD: litmus
    DBUSER: admin
    DBPASSWORD: "1234"
    DB_SERVER: "mongodb://chaos-mongodb-external.litmus.svc.cluster.local:27017/?authSource=admin"
    JWT_SECRET: ""
  portal:
    frontend:
      replicas: 1
      image:
        pullPolicy: IfNotPresent
      resources:
        requests:
          memory: "256Mi"
          cpu: "250m"
        limits:
          memory: "512Mi"
          cpu: "500m"
      service:
        type: NodePort
        port: 9091
        nodePort: 30091
    server:
      nodeSelector:
        kubernetes.io/hostname: sigma
      replicas: 1
      waitForMongodb:
        image:
          tag: "6.0"
          pullPolicy: IfNotPresent

      graphqlServer:
        image:
          pullPolicy: IfNotPresent
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      authServer:
        nodeSelector:
          kubernetes.io/hostname: sigma
        replicas: 1
        waitForMongodb:
          image:
            tag: "6.0"
            pullPolicy: IfNotPresent

        image:
          pullPolicy: IfNotPresent
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
  mongodb:
    enabled: false

# External MongoDB using official multi-arch image (arm64 + amd64)
externalMongodb:
  enabled: true
  serviceName: chaos-mongodb-external
  image:
    repository: docker.io/library/mongo
    tag: "6.0"
    pullPolicy: IfNotPresent
  auth:
    rootUser: admin
    rootPassword: "1234"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    size: 2Gi

rbac:
  enabled: true
  kafkaNamespace: kafka
  katesNamespace: kates

monitoring:
  serviceMonitor:
    enabled: true
    interval: 30s
    labels:
      release: monitoring
  grafanaDashboard:
    enabled: true
    labels:
      grafana_dashboard: "1"

pdb:
  enabled: false

networkPolicies:
  enabled: false

experiments:
  enabled: true
  image: bitnami/kubectl:latest
