# Kates Chaos — Kind Cluster Overlay
# Optimized for single-node Kind with pre-loaded images

litmus-core:
  enabled: true
  operator:
    image:
      pullPolicy: IfNotPresent
  runner:
    image:
      pullPolicy: IfNotPresent

rbac:
  enabled: true
  kafkaNamespace: kafka
  katesNamespace: kates

monitoring:
  serviceMonitor:
    enabled: true
    interval: 30s
    labels:
      release: monitoring
  grafanaDashboard:
    enabled: true
    labels:
      grafana_dashboard: "1"

pdb:
  enabled: false

networkPolicies:
  enabled: false

experiments:
  enabled: true
  # FIX #8: pin to the exact same kubectl version used everywhere else in the stack
  image: registry.k8s.io/kubectl:v1.33.0
