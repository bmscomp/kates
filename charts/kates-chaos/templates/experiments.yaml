{{- if .Values.experiments.enabled }}
{{- $kafkaNamespace := .Values.rbac.kafkaNamespace | default "kafka" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kates-chaos.fullname" . }}-experiments
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kates-chaos.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: experiment-installer
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "kates-chaos.fullname" . }}-experiment-installer
      containers:
      # FIX #9: wait for the Litmus server GraphQL endpoint before applying CRDs.
      # Without this, the post-install hook races the Litmus portal startup and
      # fails when pods are still in Init state.
      initContainers:
        - name: wait-for-litmus
          image: {{ .Values.experiments.image | default "registry.k8s.io/kubectl:v1.33.0" }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Litmus chaos-operator to be ready..."
              kubectl rollout status deployment -n {{ .Release.Namespace }} \
                -l app.kubernetes.io/component=chaos-operator --timeout=300s || true
              echo "Waiting for ChaosExperiment CRD to be established..."
              until kubectl get crd chaosexperiments.litmuschaos.io > /dev/null 2>&1; do
                echo "  CRD not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "Litmus is ready — proceeding with experiment installation."
      containers:
        - name: install
          image: {{ .Values.experiments.image | default "registry.k8s.io/kubectl:v1.33.0" }}
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh"]
          args:
            - -c
            - |
              echo "Installing ChaosExperiment definitions in {{ $kafkaNamespace }}..."
              {{- range .Values.experiments.definitions }}
              kubectl apply -f - <<'EOF'
              apiVersion: litmuschaos.io/v1alpha1
              kind: ChaosExperiment
              metadata:
                name: {{ .name }}
                namespace: {{ $kafkaNamespace }}
              spec:
                definition:
                  scope: {{ .scope | default "Namespaced" }}
                  # pin to versioned tag matching chart appVersion (3.28.0)
                  # ':latest' is not pre-loaded in Kind offline mode.
                  image: {{ .image | default "litmuschaos/go-runner:3.28.0" }}
                  imagePullPolicy: IfNotPresent
                  args: ["-name", "{{ .name }}"]
                  command: ["/bin/bash"]
              EOF
              echo "  ✓ {{ .name }}"
              {{- end }}
              echo "Done — {{ len $.Values.experiments.definitions }} experiments installed"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kates-chaos.fullname" . }}-experiment-installer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kates-chaos.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kates-chaos.fullname" . }}-experiment-installer
  labels:
    {{- include "kates-chaos.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["litmuschaos.io"]
    resources: ["chaosexperiments"]
    verbs: ["create", "get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kates-chaos.fullname" . }}-experiment-installer
  labels:
    {{- include "kates-chaos.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kates-chaos.fullname" . }}-experiment-installer
subjects:
  - kind: ServiceAccount
    name: {{ include "kates-chaos.fullname" . }}-experiment-installer
    namespace: {{ .Release.Namespace }}
{{- end }}
