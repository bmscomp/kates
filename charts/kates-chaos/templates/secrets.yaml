{{- $secretName := printf "%s-auth" (include "kates-chaos.fullname" .) }}
{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kates-chaos.labels" . | nindent 4 }}
  annotations:
    # FIX #5: keep prevents deletion on uninstall; the lookup ensures the secret
    # is only created once — subsequent helm upgrades will not regenerate the
    # random values (randAlphaNum), preventing auth mismatches between server
    # and MongoDB after a re-deploy.
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) }}
  {{- if $existing }}
  {{- /* Secret already exists — preserve its values exactly */}}
  admin-password: {{ index $existing.data "admin-password" | default (.Values.auth.adminPassword | default "litmus" | b64enc) }}
  db-root-password: {{ index $existing.data "db-root-password" | default (.Values.auth.dbRootPassword | default (randAlphaNum 16) | b64enc) }}
  jwt-secret: {{ index $existing.data "jwt-secret" | default (.Values.auth.jwtSecret | default (randAlphaNum 32) | b64enc) }}
  {{- else }}
  {{- /* First install — generate random values */}}
  admin-password: {{ .Values.auth.adminPassword | default "litmus" | b64enc | quote }}
  db-root-password: {{ .Values.auth.dbRootPassword | default (randAlphaNum 16) | b64enc | quote }}
  jwt-secret: {{ .Values.auth.jwtSecret | default (randAlphaNum 32) | b64enc | quote }}
  {{- end }}
{{- end }}
