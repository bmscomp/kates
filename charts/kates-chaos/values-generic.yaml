# Kates Chaos — Generic Kubernetes Cluster Overlay
# Cloud-native defaults for any standard Kubernetes environment

litmus-core:
  enabled: true
  operator:
    image:
      pullPolicy: Always
  runner:
    image:
      pullPolicy: Always

rbac:
  enabled: true
  kafkaNamespace: kafka
  katesNamespace: kates

monitoring:
  serviceMonitor:
    enabled: true
    interval: 15s
    labels:
      release: monitoring
  grafanaDashboard:
    enabled: true
    labels:
      grafana_dashboard: "1"

pdb:
  enabled: true

kyvernoPolicy:
  enabled: true
  action: Audit
  mutate: true

networkPolicies:
  enabled: true

experiments:
  enabled: true
  image: registry.k8s.io/kubectl:v1.33.0
