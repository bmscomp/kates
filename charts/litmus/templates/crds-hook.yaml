{{- if .Values.crds.install }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "litmus-portal.fullname" . }}-crd-install
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "litmus-portal.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: crd-installer
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "litmus-portal.fullname" . }}-crd-installer
      containers:
        - name: crd-install
          image: {{ .Values.crds.image | default "bitnami/kubectl:latest" }}
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Installing Litmus ChaosEngine CRDs..."
              kubectl apply --server-side -f /crds/chaos-crds.yaml 2>/dev/null || \
                kubectl apply -f /crds/chaos-crds.yaml
              echo "Installing Kafka Litmus CRDs..."
              kubectl apply --server-side -f /crds/kafka-crds.yaml 2>/dev/null || \
                kubectl apply -f /crds/kafka-crds.yaml
              echo "Waiting for CRDs to be established..."
              kubectl wait --for=condition=Established crd/chaosengines.litmuschaos.io --timeout=60s 2>/dev/null || true
              kubectl wait --for=condition=Established crd/chaosresults.litmuschaos.io --timeout=60s 2>/dev/null || true
              kubectl wait --for=condition=Established crd/chaosexperiments.litmuschaos.io --timeout=60s 2>/dev/null || true
              echo "CRDs installed successfully"
          volumeMounts:
            - name: crds
              mountPath: /crds
      volumes:
        - name: crds
          configMap:
            name: {{ include "litmus-portal.fullname" . }}-crds
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "litmus-portal.fullname" . }}-crd-installer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "litmus-portal.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "litmus-portal.fullname" . }}-crd-installer
  labels:
    {{- include "litmus-portal.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["create", "get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "litmus-portal.fullname" . }}-crd-installer
  labels:
    {{- include "litmus-portal.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "litmus-portal.fullname" . }}-crd-installer
subjects:
  - kind: ServiceAccount
    name: {{ include "litmus-portal.fullname" . }}-crd-installer
    namespace: {{ .Release.Namespace }}
{{- end }}
