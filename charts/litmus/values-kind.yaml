# Litmus Chaos — Kind Cluster Overlay
# Optimized for offline Kind environments on Apple Silicon

# CRD installation via pre-install hook
crds:
  install: true
  image: bitnami/kubectl:latest

# RBAC for chaos experiments
rbac:
  enabled: true
  kafkaNamespace: kafka
  katesNamespace: kates

# Prometheus integration
monitoring:
  serviceMonitor:
    enabled: true
    interval: 30s
    labels:
      release: monitoring

# Chaos experiment definitions (blueprints only)
experiments:
  enabled: true
  definitions:
    - name: pod-delete
      scope: Namespaced
      permissions:
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["create", "delete", "get", "list", "patch", "update", "deletecollection"]
        - apiGroups: [""]
          resources: ["events"]
          verbs: ["create", "get", "list", "patch", "update"]
        - apiGroups: [""]
          resources: ["pods/log"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["batch"]
          resources: ["jobs"]
          verbs: ["create", "list", "get", "delete", "deletecollection"]
        - apiGroups: ["litmuschaos.io"]
          resources: ["chaosengines", "chaosexperiments", "chaosresults"]
          verbs: ["create", "list", "get", "patch", "update", "delete"]

    - name: pod-cpu-hog
      scope: Namespaced
      permissions:
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["create", "delete", "get", "list", "patch", "update", "deletecollection"]
        - apiGroups: [""]
          resources: ["events"]
          verbs: ["create", "get", "list", "patch", "update"]
        - apiGroups: [""]
          resources: ["pods/log", "pods/exec"]
          verbs: ["get", "list", "create"]
        - apiGroups: ["batch"]
          resources: ["jobs"]
          verbs: ["create", "list", "get", "delete", "deletecollection"]
        - apiGroups: ["litmuschaos.io"]
          resources: ["chaosengines", "chaosexperiments", "chaosresults"]
          verbs: ["create", "list", "get", "patch", "update", "delete"]

    - name: pod-memory-hog
      scope: Namespaced
      permissions:
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["create", "delete", "get", "list", "patch", "update", "deletecollection"]
        - apiGroups: [""]
          resources: ["events"]
          verbs: ["create", "get", "list", "patch", "update"]
        - apiGroups: [""]
          resources: ["pods/log", "pods/exec"]
          verbs: ["get", "list", "create"]
        - apiGroups: ["batch"]
          resources: ["jobs"]
          verbs: ["create", "list", "get", "delete", "deletecollection"]
        - apiGroups: ["litmuschaos.io"]
          resources: ["chaosengines", "chaosexperiments", "chaosresults"]
          verbs: ["create", "list", "get", "patch", "update", "delete"]

    - name: pod-network-partition
      scope: Namespaced
      permissions:
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["create", "delete", "get", "list", "patch", "update", "deletecollection"]
        - apiGroups: [""]
          resources: ["events"]
          verbs: ["create", "get", "list", "patch", "update"]
        - apiGroups: [""]
          resources: ["pods/log", "pods/exec"]
          verbs: ["get", "list", "create"]
        - apiGroups: ["batch"]
          resources: ["jobs"]
          verbs: ["create", "list", "get", "delete", "deletecollection"]
        - apiGroups: ["litmuschaos.io"]
          resources: ["chaosengines", "chaosexperiments", "chaosresults"]
          verbs: ["create", "list", "get", "patch", "update", "delete"]

    - name: pod-io-stress
      scope: Namespaced
      permissions:
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["create", "delete", "get", "list", "patch", "update", "deletecollection"]
        - apiGroups: [""]
          resources: ["events"]
          verbs: ["create", "get", "list", "patch", "update"]
        - apiGroups: [""]
          resources: ["pods/log", "pods/exec"]
          verbs: ["get", "list", "create"]
        - apiGroups: ["batch"]
          resources: ["jobs"]
          verbs: ["create", "list", "get", "delete", "deletecollection"]
        - apiGroups: ["litmuschaos.io"]
          resources: ["chaosengines", "chaosexperiments", "chaosresults"]
          verbs: ["create", "list", "get", "patch", "update", "delete"]

    - name: pod-dns-error
      scope: Namespaced
      permissions:
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["create", "delete", "get", "list", "patch", "update", "deletecollection"]
        - apiGroups: [""]
          resources: ["events"]
          verbs: ["create", "get", "list", "patch", "update"]
        - apiGroups: [""]
          resources: ["pods/log", "pods/exec"]
          verbs: ["get", "list", "create"]
        - apiGroups: ["batch"]
          resources: ["jobs"]
          verbs: ["create", "list", "get", "delete", "deletecollection"]
        - apiGroups: ["litmuschaos.io"]
          resources: ["chaosengines", "chaosexperiments", "chaosresults"]
          verbs: ["create", "list", "get", "patch", "update", "delete"]

    - name: node-drain
      scope: Cluster
      permissions:
        - apiGroups: [""]
          resources: ["nodes"]
          verbs: ["get", "list", "patch", "update"]
        - apiGroups: [""]
          resources: ["pods", "pods/eviction"]
          verbs: ["get", "list", "create", "delete"]
        - apiGroups: ["apps"]
          resources: ["daemonsets"]
          verbs: ["list", "get", "delete"]
        - apiGroups: ["litmuschaos.io"]
          resources: ["chaosengines", "chaosexperiments", "chaosresults"]
          verbs: ["create", "list", "get", "patch", "update", "delete"]

# Portal frontend — Kind resources
portal:
  frontend:
    replicas: 1
    image:
      pullPolicy: IfNotPresent
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "300m"
    service:
      type: NodePort
      port: 9091
      nodePort: 30091

  server:
    replicas: 1
    waitForMongodb:
      image:
        pullPolicy: IfNotPresent
      resources:
        requests:
          memory: "64Mi"
          cpu: "25m"
        limits:
          memory: "128Mi"
          cpu: "100m"
    graphqlServer:
      image:
        pullPolicy: IfNotPresent
      resources:
        requests:
          memory: "200Mi"
          cpu: "150m"
        limits:
          memory: "512Mi"
          cpu: "400m"
    authServer:
      replicas: 1
      image:
        pullPolicy: IfNotPresent
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "384Mi"
          cpu: "300m"

# MongoDB — single node for Kind
mongodb:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/mongodb
    tag: 8.0.13-debian-12-r0
    pullPolicy: IfNotPresent
  architecture: replicaset
  replicaCount: 1
  arbiter:
    enabled: false
  persistence:
    enabled: true
    size: 2Gi
  volumePermissions:
    enabled: true
    image:
      registry: docker.io
      repository: bitnamilegacy/os-shell
      tag: 12-debian-12-r51
      pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
