# Staging overrides — production-like topology, moderate resources
clusterName: krafter

controllers:
  replicas: 3
  storage:
    size: 10Gi

brokerPools:
  - name: brokers-az1
    zone: ""
    replicas: 1
    storageSize: 100Gi
    storageClass: ""
  - name: brokers-az2
    zone: ""
    replicas: 1
    storageSize: 100Gi
    storageClass: ""
  - name: brokers-az3
    zone: ""
    replicas: 1
    storageSize: 100Gi
    storageClass: ""

brokerDefaults:
  jvmOptions:
    -Xms: 2048m
    -Xmx: 2048m
  resources:
    requests:
      memory: 4Gi
      cpu: 1000m
    limits:
      memory: 4Gi
      cpu: 2000m

networkPolicies:
  enabled: true

alerts:
  enabled: true

podSecurityPolicy:
  enabled: true
  action: Enforce

backup:
  enabled: true
  schedule: "0 2 * * *"
  ttl: 168h0m0s
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""

lifecycle:
  preStopSleepSeconds: 15

rbac:
  create: true

dashboards:
  enabled: true
  brokerDashboard: true
  kraftDashboard: true
  cruiseControlDashboard: true
  connectDashboard: true
