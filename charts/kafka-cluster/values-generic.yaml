# Kafka Cluster — Generic Kubernetes Overlay
# Deploys a 3-node Kafka cluster on any standard Kubernetes environment.
# Uses the default StorageClass, no zone affinity, no monitoring dependencies.
#
# Usage:
#   make kafka-standalone
#   # or manually:
#   helm upgrade --install kafka-cluster charts/kafka-cluster/ \
#     -n kafka --create-namespace \
#     -f charts/kafka-cluster/values-generic.yaml

# ── Node Pools ────────────────────────────────────────────────────────────────
# Single controller pool with 3 replicas (no zone-specific storage)
controllerPools:
  - name: controllers
    zone: ""
    replicas: 3
    storageSize: 5Gi
    storageClass: ""   # uses cluster default StorageClass

controllerDefaults:
  deleteClaim: false
  jvmOptions:
    -Xms: 512m
    -Xmx: 512m
    gcLoggingEnabled: false
  topologySpreadConstraints:
    enabled: false
  podAntiAffinity:
    enabled: true
    topologyKey: kubernetes.io/hostname
  tolerations: []

# Single broker pool with 3 replicas (no zone-specific storage)
brokerPools:
  - name: brokers
    zone: ""
    replicas: 3
    storageSize: 50Gi
    storageClass: ""   # uses cluster default StorageClass

brokerDefaults:
  deleteClaim: false
  jvmOptions:
    -Xms: 1024m
    -Xmx: 1024m
    gcLoggingEnabled: false
  topologySpreadConstraints:
    enabled: false
  podAntiAffinity:
    enabled: true
    topologyKey: kubernetes.io/hostname
  tolerations: []

# ── Listeners ─────────────────────────────────────────────────────────────────
# Internal only — no external nodeport (safe for any cluster)
kafka:
  listeners:
    - name: plain
      port: 9092
      type: internal
      tls: false
      authentication:
        type: scram-sha-512
    - name: tls
      port: 9093
      type: internal
      tls: true
      authentication:
        type: tls
  metricsConfig:
    enabled: false

# ── Monitoring — all disabled ─────────────────────────────────────────────────
kafkaExporter:
  enabled: false

cruiseControl:
  enabled: false

alerts:
  enabled: false

podMonitors:
  enabled: false

dashboards:
  enabled: false

networkPolicies:
  enabled: false

# ── Operator — pre-installed externally ───────────────────────────────────────
strimziOperator:
  enabled: false

crdUpgrade:
  enabled: false

# ── Features — disabled for minimal footprint ────────────────────────────────
tieredStorage:
  enabled: false

backup:
  enabled: false

drainCleaner:
  enabled: false

rebalance:
  enabled: false

kafkaConnect:
  enabled: false

podSecurityPolicy:
  enabled: false
