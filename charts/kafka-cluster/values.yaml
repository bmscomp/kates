clusterName: krafter
kafkaVersion: "4.2.0"
strimziVersion: "1.0.0"

# ── Global Image Configuration ───────────────────────────────────────────────
# Override these to pull all images from a private or air-gapped registry.
# Example: global.imageRegistry: "my-registry.example.com"
global:
  imageRegistry: "quay.io"
  imageRepository: "strimzi"

# ── Image Overrides ──────────────────────────────────────────────────────────
# Per-component image references for test pods and utilities.
images:
  # Kafka client image used in Helm test tier 2 (produce/consume round-trip)
  kafka: "quay.io/strimzi/kafka:1.0.0-kafka-4.2.0"
  # kubectl image used in Helm tests and CRD upgrade hooks
  kubectl: "bitnami/kubectl:1.33.0"

kafka:
  listeners:
    - name: plain
      port: 9092
      type: internal
      tls: false
      authentication:
        type: scram-sha-512
    - name: tls
      port: 9093
      type: internal
      tls: true
      authentication:
        type: tls
    - name: external
      port: 9094
      type: nodeport
      tls: true
      authentication:
        type: scram-sha-512
      configuration:
        bootstrap:
          nodePort: null

  authorization:
    type: simple
    superUsers:
      - kates-backend

  config:
    offsets.topic.replication.factor: 3
    transaction.state.log.replication.factor: 3
    transaction.state.log.min.isr: 2
    default.replication.factor: 3
    min.insync.replicas: 2
    unclean.leader.election.enable: false
    auto.create.topics.enable: false
    log.retention.hours: 24
    log.retention.bytes: 10737418240
    log.segment.bytes: 1073741824
    log.cleanup.policy: delete
    num.io.threads: 8
    num.network.threads: 5
    num.replica.fetchers: 3
    quota.producer.default: 52428800
    quota.consumer.default: 104857600
    message.max.bytes: 10485760
    group.share.enable: true
    group.min.session.timeout.ms: 6000
    group.max.session.timeout.ms: 1800000
    metadata.log.max.record.bytes.between.snapshots: 20971520
    controller.quorum.election.timeout.ms: 5000
    controller.quorum.fetch.timeout.ms: 10000
    controller.quorum.election.backoff.max.ms: 5000

  rack:
    topologyKey: topology.kubernetes.io/zone

  template:
    podDisruptionBudget:
      maxUnavailable: 1

  metricsConfig:
    type: jmxPrometheusExporter

  clusterCa:
    generateCertificateAuthority: true
    validityDays: 1825
    renewalDays: 180
    certificateExpirationPolicy: replace-key

  clientsCa:
    generateCertificateAuthority: true
    validityDays: 1825
    renewalDays: 180
    certificateExpirationPolicy: replace-key

controllers:
  replicas: 3
  storage:
    size: 5Gi
    class: "standard"
    deleteClaim: false
  jvmOptions:
    -Xms: 512m
    -Xmx: 512m
    gcLoggingEnabled: true
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 1Gi
      cpu: 1000m
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
  podAntiAffinity:
    enabled: true
    topologyKey: topology.kubernetes.io/zone
  tolerations: []
  priorityClassName: ""
  sysctl:
    enabled: false
    image: busybox:1.37
    params:
      vm.max_map_count: "262144"
      net.core.somaxconn: "16384"
      vm.swappiness: "1"

brokerPools:
  - name: brokers-az1
    zone: "us-east-1a"
    replicas: 1
    storageSize: 50Gi
    storageClass: "standard"
  - name: brokers-az2
    zone: "us-east-1b"
    replicas: 1
    storageSize: 50Gi
    storageClass: "standard"
  - name: brokers-az3
    zone: "us-east-1c"
    replicas: 1
    storageSize: 50Gi
    storageClass: "standard"

brokerDefaults:
  deleteClaim: false
  jvmOptions:
    -Xms: 2048m
    -Xmx: 2048m
    gcLoggingEnabled: true
  resources:
    requests:
      memory: 4Gi
      cpu: 1000m
    limits:
      memory: 4Gi
      cpu: 2000m
  tolerations: []
  priorityClassName: ""
  sysctl:
    enabled: false
    image: busybox:1.37
    params:
      vm.max_map_count: "262144"
      net.core.somaxconn: "16384"
      vm.swappiness: "1"
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
  podAntiAffinity:
    enabled: true
    topologyKey: kubernetes.io/hostname

entityOperator:
  topicOperator:
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 500m
    jvmOptions:
      -Xms: 128m
      -Xmx: 256m
    reconciliationIntervalMs: 60000
  userOperator:
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 500m
    jvmOptions:
      -Xms: 128m
      -Xmx: 256m

kafkaExporter:
  enabled: true
  topicRegex: ".*"
  groupRegex: ".*"
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

cruiseControl:
  enabled: true
  brokerCapacity:
    cpu: "2000m"
    inboundNetwork: 50MiB/s
    outboundNetwork: 50MiB/s
  autoRebalance:
    - mode: add-brokers
    - mode: remove-brokers
  config: {}
  resources:
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 512Mi
      cpu: 500m

topics:
  # -- Enable managed topic provisioning
  enabled: true
  # -- Topic definitions
  items:
    - name: kates-events
      partitions: 6
      replicas: 3
      config:
        retention.ms: "172800000"
        min.insync.replicas: "2"
        cleanup.policy: delete
        segment.bytes: "1073741824"
    - name: kates-results
      partitions: 12
      replicas: 3
      config:
        retention.ms: "604800000"
        min.insync.replicas: "2"
        cleanup.policy: delete
        segment.bytes: "1073741824"
        compression.type: lz4
    - name: kates-metrics
      partitions: 6
      replicas: 3
      config:
        retention.ms: "86400000"
        min.insync.replicas: "2"
        cleanup.policy: delete
        compression.type: lz4
    - name: kates-audit
      partitions: 3
      replicas: 3
      config:
        retention.ms: "2592000000"
        min.insync.replicas: "2"
        cleanup.policy: delete
    - name: kates-dlq
      partitions: 3
      replicas: 3
      config:
        retention.ms: "-1"
        min.insync.replicas: "2"
        cleanup.policy: compact

users:
  # -- Enable managed user provisioning
  enabled: true
  # -- User definitions
  items:
    - name: kates-backend
      authentication:
        type: scram-sha-512
    - name: kafka-ui
      authentication:
        type: scram-sha-512
      quotas:
        producerByteRate: 1048576
        consumerByteRate: 52428800
        requestPercentage: 10
      authorization:
        type: simple
        acls:
          - resource:
              type: topic
              name: "*"
              patternType: literal
            operations: ["Describe", "Read"]
            host: "*"
          - resource:
              type: group
              name: "*"
              patternType: literal
            operations: ["Describe", "Read"]
            host: "*"
          - resource:
              type: cluster
            operations: ["Describe"]
            host: "*"
    - name: apicurio-registry
      authentication:
        type: scram-sha-512
      quotas:
        producerByteRate: 10485760
        consumerByteRate: 20971520
        requestPercentage: 15
      authorization:
        type: simple
        acls:
          - resource:
              type: topic
              name: "__apicurio"
              patternType: prefix
            operations: ["Read", "Write", "Create", "Describe"]
            host: "*"
          - resource:
              type: group
              name: "apicurio"
              patternType: prefix
            operations: ["Read", "Describe"]
            host: "*"
    - name: litmus-chaos
      authentication:
        type: scram-sha-512
      authorization:
        type: simple
        acls:
          - resource:
              type: topic
              name: "*"
              patternType: literal
            operations: ["Read", "Write", "Create", "Delete", "Describe", "Alter"]
            host: "*"
          - resource:
              type: group
              name: "litmus"
              patternType: prefix
            operations: ["Read", "Describe"]
            host: "*"
          - resource:
              type: cluster
            operations: ["Describe"]
            host: "*"
    - name: kates-connect
      authentication:
        type: scram-sha-512
      quotas:
        producerByteRate: 52428800
        consumerByteRate: 52428800
        requestPercentage: 25
      authorization:
        type: simple
        acls:
          - resource:
              type: topic
              name: "kates-connect-"
              patternType: prefix
            operations: ["Read", "Write", "Create", "Describe"]
            host: "*"
          - resource:
              type: topic
              name: "kates-"
              patternType: prefix
            operations: ["Read", "Write", "Create", "Describe"]
            host: "*"
          - resource:
              type: group
              name: "kates-connect"
              patternType: prefix
            operations: ["Read", "Describe"]
            host: "*"
          - resource:
              type: cluster
            operations: ["Describe"]
            host: "*"

alerts:
  enabled: true
  labels:
    release: monitoring
    prometheus: kube-prometheus

networkPolicies:
  enabled: true
  allowedClientNamespaces:
    - kates
    - litmus
  monitoringNamespace: monitoring

tieredStorage:
  enabled: false
  credentials:
    # When seaweedfs.enabled=true the chart creates 'kafka-seaweedfs-credentials'.
    # Set existingSecret to that name so the RSM plugin picks up the right creds.
    existingSecret: "kafka-seaweedfs-credentials"
    accessKeyId: ""
    secretAccessKey: ""
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
  s3:
    bucketName: kafka-tiered-storage
    region: us-east-1
    # Default endpoint targets SeaweedFS filer S3 gateway.
    # Change to your cluster's SeaweedFS service address or any S3-compatible URL.
    # DEPRECATED: do NOT point this at minio.velero.svc — MinIO is removed.
    endpointUrl: "http://kafka-cluster-seaweedfs-filer.kafka.svc:8333"
    pathStyleAccessEnabled: true
  metadata:
    replicationFactor: 3
    partitions: 50
  retention:
    taskIntervalMs: 30000
    localRetentionMs: 86400000   # 1 day on local disk; rest lives in SeaweedFS

kafkaConnect:
  enabled: false
  replicas: 1
  version: ""
  groupId: kates-connect-cluster

  jvmOptions:
    -Xms: 256m
    -Xmx: 512m
    gcLoggingEnabled: true
    javaSystemProperties: []
    # - name: com.sun.management.jmxremote
    #   value: "true"

  resources:
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: 1000m

  config:
    replicationFactor: 3
    # Converter defaults — override for Avro/Protobuf
    keyConverter: org.apache.kafka.connect.json.JsonConverter
    valueConverter: org.apache.kafka.connect.json.JsonConverter
    keyConverterSchemasEnable: true
    valueConverterSchemasEnable: true
  # Arbitrary extra Kafka Connect config (merged into spec.config)
  extraConfig: {}
    # producer.acks: "all"
    # consumer.auto.offset.reset: earliest
    # schema.registry.url: http://apicurio-registry:8080/apis/ccompat/v7

  logging:
    type: inline
    loggers:
      connect.root.logger.level: INFO
      # log4j.logger.org.apache.kafka.connect: DEBUG
      # log4j.logger.org.apache.kafka.connect.runtime.WorkerSourceTask: TRACE

  tls:
    enabled: false
    # trustedCertificates:
    #   - secretName: krafter-cluster-ca-cert
    #     certificate: ca.crt

  rack:
    enabled: false
    topologyKey: topology.kubernetes.io/zone

  tolerations: []
  topologySpreadConstraints:
    enabled: false
    maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
  podAntiAffinity:
    enabled: false
    topologyKey: kubernetes.io/hostname

  readinessProbe:
    initialDelaySeconds: 60
    timeoutSeconds: 5
  livenessProbe:
    initialDelaySeconds: 60
    timeoutSeconds: 5

  autoRestart:
    enabled: true
    maxRestarts: 10

  build: {}
    # output:
    #   type: docker
    #   image: my-registry/my-connect:latest
    #   pushSecret: my-registry-credentials
    # plugins:
    #   - name: debezium-postgres
    #     artifacts:
    #       - type: maven
    #         group: io.debezium
    #         artifact: debezium-connector-postgres
    #         version: 2.5.0.Final

  connectors: []
    # - name: my-source-connector
    #   class: io.debezium.connector.postgresql.PostgresConnector
    #   tasksMax: 1
    #   autoRestart:
    #     enabled: true
    #     maxRestarts: 5
    #   config:
    #     database.hostname: postgres.default.svc
    #     database.port: "5432"
    #     database.user: replicator
    #     database.password: "${file:/opt/kafka/external-configuration/pg-credentials/password}"
    #     database.dbname: mydb
    #     topic.prefix: cdc

crdUpgrade:
  enabled: true
  image: "bitnami/kubectl:latest"

dashboards:
  enabled: true
  namespace: monitoring
  label: grafana_dashboard
  labelValue: "1"
  brokerDashboard: true
  kraftDashboard: true
  cruiseControlDashboard: true
  connectDashboard: false

podSecurityPolicy:
  enabled: false
  action: Audit

backup:
  enabled: false
  schedule: "0 2 * * *"
  ttl: 168h0m0s
  # ── IMPORTANT ─────────────────────────────────────────────────────────────
  # snapshotVolumes MUST be false when tieredStorage is enabled.
  # Broker PVC snapshots are crash-consistent and redundant once log segments
  # are continuously offloaded to SeaweedFS via the Remote Log Storage API.
  # Only KRaft controller PVCs (1 Gi each) are in scope — see backup.yaml.
  # See README "Why NetBackup is Incompatible with Kafka" for full rationale.
  snapshotVolumes: false
  defaultVolumesToFsBackup: false   # controller PVCs are tiny; fs-backup via Velero
  storageLocation: default          # Velero BackupStorageLocation name (→ SeaweedFS)
  volumeSnapshotLocations: []
  persistence:
    enabled: false
    size: 20Gi
    storageClass: ""
    existingClaim: ""

rebalance:
  enabled: true
  goals:
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.RackAwareGoal
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.ReplicaCapacityGoal
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.DiskCapacityGoal
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.NetworkInboundCapacityGoal
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.NetworkOutboundCapacityGoal
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.CpuCapacityGoal
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.TopicReplicaDistributionGoal
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.LeaderBytesInDistributionGoal

drainCleaner:
  enabled: false
  image: quay.io/strimzi/drain-cleaner:1.0.0
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

podMonitors:
  enabled: true
  labels:
    release: monitoring

strimziOperator:
  enabled: true

strimzi-kafka-operator:
  replicas: 1
  watchAnyNamespace: true
  defaultImageTag: 1.0.0
  # When global.imageRegistry is set, pass it to the Strimzi subchart
  # defaultImageRegistry: quay.io
  # defaultImageRepository: strimzi
  fullReconciliationIntervalMs: 60000
  podSecurityContext:
    runAsNonRoot: true
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 1000m
  operatorNetworkPolicy:
    enabled: true
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
    unhealthyPodEvictionPolicy: IfHealthyBudget
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 30
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 30
  dashboards:
    enabled: true
    namespace: monitoring
    label: grafana_dashboard
    labelValue: "1"
  generateNetworkPolicy: true
  generatePodDisruptionBudget: true

lifecycle:
  preStopSleepSeconds: 15

rbac:
  create: true
  extraRules: []

serviceAccount:
  annotations: {}

externalSecrets:
  enabled: false
  secretStore:
    create: false
    provider: {}
    # Example: Kubernetes provider (read secrets from another namespace)
    # provider:
    #   kubernetes:
    #     remoteNamespace: kafka
    #     server:
    #       caProvider:
    #         type: ConfigMap
    #         name: kube-root-ca.crt
    #         key: ca.crt
    #     auth:
    #       serviceAccount:
    #         name: krafter-admin
    # Example: HashiCorp Vault
    # provider:
    #   vault:
    #     server: "https://vault.example.com"
    #     path: "secret"
    #     auth:
    #       kubernetes:
    #         mountPath: "kubernetes"
    #         role: "kafka"
  push: []
  # Push Strimzi user secrets to an external vault:
  # push:
  #   - sourceSecret: kates-backend
  #     refreshInterval: 1h
  #     data:
  #       - secretKey: password
  #         remoteKey: kafka/kates-backend
  #         property: password
  #       - secretKey: sasl.jaas.config
  #         remoteKey: kafka/kates-backend
  #         property: jaas
  pull: []
  # Pull credentials from vault into kafka namespace:
  # pull:
  #   - targetSecret: kafka-tiered-storage-credentials
  #     refreshInterval: 1h
  #     data:
  #       - secretKey: AWS_ACCESS_KEY_ID
  #         remoteKey: cloud/aws
  #         property: access_key
  #       - secretKey: AWS_SECRET_ACCESS_KEY
  #         remoteKey: cloud/aws
  #         property: secret_key
  sync: []
  # Sync Strimzi user secrets to other namespaces:
  # sync:
  #   - name: kates-backend-to-kates
  #     sourceSecret: kates-backend
  #     targetNamespace: kates
  #     refreshInterval: 30s
  #     secretStoreKind: ClusterSecretStore

# ─────────────────────────────────────────────────────────────────────────────
# SeaweedFS — S3-compatible object store (replaces deprecated MinIO)
# Shared backend for:
#   - Kafka Tiered Storage / Remote Log Storage API  (Layer 1, continuous)
#   - Velero BackupStorageLocation                   (Layer 2, daily CRD backup)
# ─────────────────────────────────────────────────────────────────────────────
seaweedfs:
  enabled: false   # set true in staging/prod overlays

  # S3 credentials — shared by tiered storage RSM plugin and Velero.
  # Written to the 'kafka-seaweedfs-credentials' Secret (see seaweedfs.yaml).
  s3:
    accessKeyId:     "kates-kafka"
    secretAccessKey: "change-me-in-prod"
    region:          "us-east-1"

  # Bucket names — pre-created by the SeaweedFS filer S3 gateway on first use.
  buckets:
    tieredStorage: "kafka-tiered-storage"
    velero:        "velero-backups"

  # Filer S3 gateway port (published in the kafka-seaweedfs-config ConfigMap).
  filer:
    s3:
      port: 8333

  # Pass-through to the seaweedfs subchart.
  # Full schema: https://github.com/seaweedfs/seaweedfs/tree/master/k8s/charts/seaweedfs
  master:
    replicas: 1          # 3 for production HA

  volume:
    replicas: 1          # 3 for production HA
    storage: 100Gi       # increase to 500Gi+ in prod

  filer:
    replicas: 1
    s3:
      enabled: true
      port: 8333
      httpsPort: 0
      allowEmptyFolder: false
      enableAuth: false    # enable in prod with TLS + external cert
