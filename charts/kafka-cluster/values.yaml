clusterName: krafter
kafkaVersion: "4.2.0"
strimziVersion: "0.51.0"

kafka:
  listeners:
    - name: plain
      port: 9092
      type: internal
      tls: false
      authentication:
        type: scram-sha-512
    - name: tls
      port: 9093
      type: internal
      tls: true
      authentication:
        type: tls
    - name: external
      port: 9094
      type: nodeport
      tls: true
      authentication:
        type: scram-sha-512
      configuration:
        bootstrap:
          nodePort: null

  authorization:
    type: simple
    superUsers:
      - kates-backend

  config:
    offsets.topic.replication.factor: 3
    transaction.state.log.replication.factor: 3
    transaction.state.log.min.isr: 2
    default.replication.factor: 3
    min.insync.replicas: 2
    unclean.leader.election.enable: false
    auto.create.topics.enable: false
    log.retention.hours: 24
    log.retention.bytes: 10737418240
    log.segment.bytes: 1073741824
    log.cleanup.policy: delete
    num.io.threads: 8
    num.network.threads: 5
    num.replica.fetchers: 3
    quota.producer.default: 52428800
    quota.consumer.default: 104857600
    message.max.bytes: 10485760
    group.share.enable: true
    group.min.session.timeout.ms: 6000
    group.max.session.timeout.ms: 1800000
    metadata.log.max.record.bytes.between.snapshots: 20971520
    controller.quorum.election.timeout.ms: 5000
    controller.quorum.fetch.timeout.ms: 10000
    controller.quorum.election.backoff.max.ms: 5000

  rack:
    topologyKey: topology.kubernetes.io/zone

  template:
    podDisruptionBudget:
      maxUnavailable: 1

  metricsConfig:
    type: jmxPrometheusExporter

  clusterCa:
    generateCertificateAuthority: true
    validityDays: 1825
    renewalDays: 180
    certificateExpirationPolicy: replace-key

  clientsCa:
    generateCertificateAuthority: true
    validityDays: 1825
    renewalDays: 180
    certificateExpirationPolicy: replace-key

controllers:
  replicas: 3
  storage:
    size: 5Gi
    class: ""
    deleteClaim: false
  jvmOptions:
    -Xms: 512m
    -Xmx: 512m
    gcLoggingEnabled: true
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 1Gi
      cpu: 1000m
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
  podAntiAffinity:
    enabled: true
    topologyKey: topology.kubernetes.io/zone
  tolerations: []

brokerPools:
  - name: brokers-az1
    zone: ""
    replicas: 1
    storageSize: 50Gi
    storageClass: ""
  - name: brokers-az2
    zone: ""
    replicas: 1
    storageSize: 50Gi
    storageClass: ""
  - name: brokers-az3
    zone: ""
    replicas: 1
    storageSize: 50Gi
    storageClass: ""

brokerDefaults:
  deleteClaim: false
  jvmOptions:
    -Xms: 2048m
    -Xmx: 2048m
    gcLoggingEnabled: true
  resources:
    requests:
      memory: 4Gi
      cpu: 1000m
    limits:
      memory: 4Gi
      cpu: 2000m
  tolerations: []
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
  podAntiAffinity:
    enabled: true
    topologyKey: kubernetes.io/hostname

entityOperator:
  topicOperator:
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 500m
    jvmOptions:
      -Xms: 128m
      -Xmx: 256m
    reconciliationIntervalMs: 60000
  userOperator:
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 500m
    jvmOptions:
      -Xms: 128m
      -Xmx: 256m

kafkaExporter:
  enabled: true
  topicRegex: ".*"
  groupRegex: ".*"
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

cruiseControl:
  enabled: true
  brokerCapacity:
    cpu: "2000m"
    inboundNetwork: 50MiB/s
    outboundNetwork: 50MiB/s
  autoRebalance:
    - mode: add-brokers
    - mode: remove-brokers
  config: {}
  resources:
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 512Mi
      cpu: 500m

topics:
  # -- Enable managed topic provisioning
  enabled: true
  # -- Topic definitions
  items:
    - name: kates-events
      partitions: 6
      replicas: 3
      config:
        retention.ms: "172800000"
        min.insync.replicas: "2"
        cleanup.policy: delete
        segment.bytes: "1073741824"
    - name: kates-results
      partitions: 12
      replicas: 3
      config:
        retention.ms: "604800000"
        min.insync.replicas: "2"
        cleanup.policy: delete
        segment.bytes: "1073741824"
        compression.type: lz4
    - name: kates-metrics
      partitions: 6
      replicas: 3
      config:
        retention.ms: "86400000"
        min.insync.replicas: "2"
        cleanup.policy: delete
        compression.type: lz4
    - name: kates-audit
      partitions: 3
      replicas: 3
      config:
        retention.ms: "2592000000"
        min.insync.replicas: "2"
        cleanup.policy: delete
    - name: kates-dlq
      partitions: 3
      replicas: 3
      config:
        retention.ms: "-1"
        min.insync.replicas: "2"
        cleanup.policy: compact

users:
  # -- Enable managed user provisioning
  enabled: true
  # -- User definitions
  items:
    - name: kates-backend
      authentication:
        type: scram-sha-512
    - name: kafka-ui
      authentication:
        type: scram-sha-512
      quotas:
        producerByteRate: 1048576
        consumerByteRate: 52428800
        requestPercentage: 10
      authorization:
        type: simple
        acls:
          - resource:
              type: topic
              name: "*"
              patternType: literal
            operations: ["Describe", "Read"]
            host: "*"
          - resource:
              type: group
              name: "*"
              patternType: literal
            operations: ["Describe", "Read"]
            host: "*"
          - resource:
              type: cluster
            operations: ["Describe"]
            host: "*"
    - name: apicurio-registry
      authentication:
        type: scram-sha-512
      quotas:
        producerByteRate: 10485760
        consumerByteRate: 20971520
        requestPercentage: 15
      authorization:
        type: simple
        acls:
          - resource:
              type: topic
              name: "__apicurio"
              patternType: prefix
            operations: ["Read", "Write", "Create", "Describe"]
            host: "*"
          - resource:
              type: group
              name: "apicurio"
              patternType: prefix
            operations: ["Read", "Describe"]
            host: "*"
    - name: litmus-chaos
      authentication:
        type: scram-sha-512
      authorization:
        type: simple
        acls:
          - resource:
              type: topic
              name: "*"
              patternType: literal
            operations: ["Read", "Write", "Create", "Delete", "Describe", "Alter"]
            host: "*"
          - resource:
              type: group
              name: "litmus"
              patternType: prefix
            operations: ["Read", "Describe"]
            host: "*"
          - resource:
              type: cluster
            operations: ["Describe"]
            host: "*"
    - name: kates-connect
      authentication:
        type: scram-sha-512
      quotas:
        producerByteRate: 52428800
        consumerByteRate: 52428800
        requestPercentage: 25
      authorization:
        type: simple
        acls:
          - resource:
              type: topic
              name: "kates-connect-"
              patternType: prefix
            operations: ["Read", "Write", "Create", "Describe"]
            host: "*"
          - resource:
              type: topic
              name: "kates-"
              patternType: prefix
            operations: ["Read", "Write", "Create", "Describe"]
            host: "*"
          - resource:
              type: group
              name: "kates-connect"
              patternType: prefix
            operations: ["Read", "Describe"]
            host: "*"
          - resource:
              type: cluster
            operations: ["Describe"]
            host: "*"

alerts:
  enabled: true
  labels:
    release: monitoring
    prometheus: kube-prometheus

networkPolicies:
  enabled: true
  allowedClientNamespaces:
    - kates
    - litmus
  monitoringNamespace: monitoring

tieredStorage:
  enabled: false
  credentials:
    existingSecret: ""
    accessKeyId: minio
    secretAccessKey: minio123
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
  s3:
    bucketName: kafka-tiered-storage
    region: us-east-1
    endpointUrl: "http://minio.velero.svc:9000"
    pathStyleAccessEnabled: true
  metadata:
    replicationFactor: 3
    partitions: 50
  retention:
    taskIntervalMs: 30000
    localRetentionMs: 86400000

kafkaConnect:
  enabled: false
  replicas: 1
  version: ""
  groupId: kates-connect-cluster

  jvmOptions:
    -Xms: 256m
    -Xmx: 512m
    gcLoggingEnabled: true
    javaSystemProperties: []
    # - name: com.sun.management.jmxremote
    #   value: "true"

  resources:
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: 1000m

  config:
    replicationFactor: 3
    # Converter defaults — override for Avro/Protobuf
    keyConverter: org.apache.kafka.connect.json.JsonConverter
    valueConverter: org.apache.kafka.connect.json.JsonConverter
    keyConverterSchemasEnable: true
    valueConverterSchemasEnable: true
  # Arbitrary extra Kafka Connect config (merged into spec.config)
  extraConfig: {}
    # producer.acks: "all"
    # consumer.auto.offset.reset: earliest
    # schema.registry.url: http://apicurio-registry:8080/apis/ccompat/v7

  logging:
    type: inline
    loggers:
      connect.root.logger.level: INFO
      # log4j.logger.org.apache.kafka.connect: DEBUG
      # log4j.logger.org.apache.kafka.connect.runtime.WorkerSourceTask: TRACE

  tls:
    enabled: false
    # trustedCertificates:
    #   - secretName: krafter-cluster-ca-cert
    #     certificate: ca.crt

  rack:
    enabled: false
    topologyKey: topology.kubernetes.io/zone

  tolerations: []
  topologySpreadConstraints:
    enabled: false
    maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
  podAntiAffinity:
    enabled: false
    topologyKey: kubernetes.io/hostname

  readinessProbe:
    initialDelaySeconds: 60
    timeoutSeconds: 5
  livenessProbe:
    initialDelaySeconds: 60
    timeoutSeconds: 5

  autoRestart:
    enabled: true
    maxRestarts: 10

  build: {}
    # output:
    #   type: docker
    #   image: my-registry/my-connect:latest
    #   pushSecret: my-registry-credentials
    # plugins:
    #   - name: debezium-postgres
    #     artifacts:
    #       - type: maven
    #         group: io.debezium
    #         artifact: debezium-connector-postgres
    #         version: 2.5.0.Final

  connectors: []
    # - name: my-source-connector
    #   class: io.debezium.connector.postgresql.PostgresConnector
    #   tasksMax: 1
    #   autoRestart:
    #     enabled: true
    #     maxRestarts: 5
    #   config:
    #     database.hostname: postgres.default.svc
    #     database.port: "5432"
    #     database.user: replicator
    #     database.password: "${file:/opt/kafka/external-configuration/pg-credentials/password}"
    #     database.dbname: mydb
    #     topic.prefix: cdc

crdUpgrade:
  enabled: true
  image: "bitnami/kubectl:latest"

dashboards:
  enabled: true
  namespace: monitoring
  label: grafana_dashboard
  labelValue: "1"
  brokerDashboard: true
  kraftDashboard: true
  cruiseControlDashboard: true
  connectDashboard: false

podSecurityPolicy:
  enabled: false
  action: Audit

backup:
  enabled: false
  schedule: "0 2 * * *"
  ttl: 168h0m0s
  snapshotVolumes: true
  persistence:
    enabled: false
    size: 20Gi
    storageClass: ""
    existingClaim: ""

rebalance:
  enabled: true
  goals:
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.RackAwareGoal
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.ReplicaCapacityGoal
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.DiskCapacityGoal
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.NetworkInboundCapacityGoal
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.NetworkOutboundCapacityGoal
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.CpuCapacityGoal
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.TopicReplicaDistributionGoal
    - com.linkedin.kafka.cruisecontrol.analyzer.goals.LeaderBytesInDistributionGoal

drainCleaner:
  enabled: false
  image: quay.io/strimzi/drain-cleaner:1.2.0
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

podMonitors:
  enabled: true
  labels:
    release: monitoring

strimziOperator:
  enabled: true

strimzi-kafka-operator:
  replicas: 1
  watchAnyNamespace: true
  defaultImageTag: 0.51.0
  fullReconciliationIntervalMs: 60000
  podSecurityContext:
    runAsNonRoot: true
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 1000m
  operatorNetworkPolicy:
    enabled: true
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
    unhealthyPodEvictionPolicy: IfHealthyBudget
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 30
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 30
  dashboards:
    enabled: true
    namespace: monitoring
    label: grafana_dashboard
    labelValue: "1"
  generateNetworkPolicy: true
  generatePodDisruptionBudget: true

lifecycle:
  preStopSleepSeconds: 15

rbac:
  create: true
  extraRules: []

serviceAccount:
  annotations: {}

externalSecrets:
  enabled: false
  secretStore:
    create: false
    provider: {}
    # Example: Kubernetes provider (read secrets from another namespace)
    # provider:
    #   kubernetes:
    #     remoteNamespace: kafka
    #     server:
    #       caProvider:
    #         type: ConfigMap
    #         name: kube-root-ca.crt
    #         key: ca.crt
    #     auth:
    #       serviceAccount:
    #         name: krafter-admin
    # Example: HashiCorp Vault
    # provider:
    #   vault:
    #     server: "https://vault.example.com"
    #     path: "secret"
    #     auth:
    #       kubernetes:
    #         mountPath: "kubernetes"
    #         role: "kafka"
