{{- if .Values.topics.enabled }}
{{- range .Values.topics.items }}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: {{ .name }}
  namespace: {{ include "kafka-cluster.namespace" $ }}
  labels:
    {{- include "kafka-cluster.labels" $ | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  partitions: {{ .partitions }}
  replicas: {{ .replicas }}
  {{- with .config }}
  config:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
