{{- if .Values.externalSecrets.enabled }}
{{- $clusterName := include "kafka-cluster.clusterName" . -}}
{{- $namespace := include "kafka-cluster.namespace" . -}}
{{- if .Values.externalSecrets.secretStore.create }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ $clusterName }}-secret-store
  namespace: {{ $namespace }}
  labels:
    {{- include "kafka-cluster.labels" . | nindent 4 }}
spec:
  provider:
    {{- toYaml .Values.externalSecrets.secretStore.provider | nindent 4 }}
{{- end }}
{{- range .Values.externalSecrets.push }}
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: {{ $.Release.Name }}-push-{{ .sourceSecret }}
  namespace: {{ $namespace }}
  labels:
    {{- include "kafka-cluster.labels" $ | nindent 4 }}
spec:
  updatePolicy: Replace
  refreshInterval: {{ .refreshInterval | default "1h" }}
  secretStoreRefs:
    - name: {{ .secretStoreName | default (printf "%s-secret-store" $clusterName) }}
      kind: SecretStore
  selector:
    secret:
      name: {{ .sourceSecret }}
  {{- with .data }}
  data:
    {{- range . }}
    - match:
        secretKey: {{ .secretKey }}
        remoteRef:
          remoteKey: {{ .remoteKey }}
          {{- if .property }}
          property: {{ .property }}
          {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- range .Values.externalSecrets.pull }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $.Release.Name }}-pull-{{ .targetSecret }}
  namespace: {{ $namespace }}
  labels:
    {{- include "kafka-cluster.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ .refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .secretStoreName | default (printf "%s-secret-store" $clusterName) }}
    kind: SecretStore
  target:
    name: {{ .targetSecret }}
    creationPolicy: Owner
    {{- with .template }}
    template:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  data:
    {{- range .data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteKey }}
        {{- if .property }}
        property: {{ .property }}
        {{- end }}
    {{- end }}
{{- end }}
{{- range .Values.externalSecrets.sync }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $.Release.Name }}-sync-{{ .name }}
  namespace: {{ .targetNamespace }}
  labels:
    {{- include "kafka-cluster.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ .refreshInterval | default "30s" }}
  secretStoreRef:
    name: {{ .secretStoreName | default (printf "%s-secret-store" $clusterName) }}
    kind: {{ .secretStoreKind | default "SecretStore" }}
  target:
    name: {{ .sourceSecret }}
    creationPolicy: Owner
  dataFrom:
    - find:
        name:
          regexp: ".*"
      rewrite:
        - regexp:
            source: "(.*)"
            target: "$1"
{{- end }}
{{- end }}
