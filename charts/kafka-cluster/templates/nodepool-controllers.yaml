{{- range .Values.controllerPools }}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: {{ .name }}
  namespace: {{ include "kafka-cluster.namespace" $ }}
  labels:
    {{- include "kafka-cluster.labels" $ | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  replicas: {{ .replicas }}
  roles:
    - controller
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: {{ .storageSize }}
        {{- if .storageClass }}
        class: {{ .storageClass }}
        {{- end }}
        deleteClaim: {{ $.Values.controllerDefaults.deleteClaim }}
  jvmOptions:
    {{- toYaml $.Values.controllerDefaults.jvmOptions | nindent 4 }}
  resources:
    {{- toYaml $.Values.controllerDefaults.resources | nindent 4 }}
  template:
    pod:
      {{- if .zone }}
      metadata:
        labels:
          zone: {{ .zone }}
      {{- end }}
      securityContext:
        {{- include "kafka-cluster.podSecurityContext" $ | nindent 8 }}
      {{- if $.Values.controllerDefaults.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ $.Values.controllerDefaults.topologySpreadConstraints.maxSkew }}
          topologyKey: {{ $.Values.controllerDefaults.topologySpreadConstraints.topologyKey }}
          whenUnsatisfiable: {{ $.Values.controllerDefaults.topologySpreadConstraints.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              strimzi.io/pool-name: {{ .name }}
      {{- end }}
      affinity:
        {{- if .zone }}
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - {{ .zone }}
        {{- end }}
        {{- if $.Values.controllerDefaults.podAntiAffinity.enabled }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    strimzi.io/controller-role: "true"
                topologyKey: {{ $.Values.controllerDefaults.podAntiAffinity.topologyKey }}
        {{- end }}
      {{- with $.Values.controllerDefaults.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $.Values.controllerDefaults.priorityClassName }}
      priorityClassName: {{ $.Values.controllerDefaults.priorityClassName }}
      {{- end }}
      {{- if $.Values.controllerDefaults.sysctl.enabled }}
      initContainers:
        - name: sysctl-tuner
          image: {{ $.Values.controllerDefaults.sysctl.image }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              {{- range $key, $value := $.Values.controllerDefaults.sysctl.params }}
              sysctl -w {{ $key }}={{ $value }}
              {{- end }}
          securityContext:
            privileged: true
            runAsUser: 0
      {{- end }}
    kafkaContainer:
      securityContext:
        {{- include "kafka-cluster.containerSecurityContext" $ | nindent 8 }}
{{- end }}
