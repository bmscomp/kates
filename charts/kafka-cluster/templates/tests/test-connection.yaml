apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-connection"
  namespace: {{ include "kafka-cluster.namespace" . }}
  labels:
    {{- include "kafka-cluster.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: kafka-topic-list
      image: quay.io/strimzi/kafka:latest-kafka-{{ .Values.kafkaVersion }}
      command:
        - /bin/sh
        - -c
        - |
          echo "Testing Kafka bootstrap connectivity..."
          kafka-metadata.sh --snapshot /dev/null --cluster-id test 2>/dev/null || true

          echo "Listing topics via bootstrap server..."
          kafka-topics.sh \
            --bootstrap-server {{ include "kafka-cluster.clusterName" . }}-kafka-bootstrap:9092 \
            --list

          TOPIC_COUNT=$(kafka-topics.sh \
            --bootstrap-server {{ include "kafka-cluster.clusterName" . }}-kafka-bootstrap:9092 \
            --list 2>/dev/null | wc -l)

          echo "Found ${TOPIC_COUNT} topics."
          if [ "${TOPIC_COUNT}" -lt 1 ]; then
            echo "FAIL: No topics found"
            exit 1
          fi
          echo "PASS: Kafka connection successful"
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 256Mi
          cpu: 200m
---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-broker-health"
  namespace: {{ include "kafka-cluster.namespace" . }}
  labels:
    {{- include "kafka-cluster.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: broker-health
      image: quay.io/strimzi/kafka:latest-kafka-{{ .Values.kafkaVersion }}
      command:
        - /bin/sh
        - -c
        - |
          echo "Checking broker metadata..."
          kafka-broker-api-versions.sh \
            --bootstrap-server {{ include "kafka-cluster.clusterName" . }}-kafka-bootstrap:9092 \
            | head -20

          BROKER_COUNT=$(kafka-broker-api-versions.sh \
            --bootstrap-server {{ include "kafka-cluster.clusterName" . }}-kafka-bootstrap:9092 \
            2>/dev/null | grep "^{{ include "kafka-cluster.clusterName" . }}" | wc -l)

          echo "Active brokers: ${BROKER_COUNT}"
          EXPECTED={{ len .Values.brokerPools }}
          if [ "${BROKER_COUNT}" -lt "${EXPECTED}" ]; then
            echo "WARN: Expected at least ${EXPECTED} brokers, found ${BROKER_COUNT}"
          fi
          echo "PASS: Broker health check complete"
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 256Mi
          cpu: 200m
