{{- if .Values.crdUpgrade.enabled }}
{{- $namespace := include "kafka-cluster.namespace" . -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kafka-cluster.clusterName" . }}-crd-upgrade
  namespace: {{ $namespace }}
  labels:
    {{- include "kafka-cluster.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kafka-cluster.clusterName" . }}-crd-upgrade
  labels:
    {{- include "kafka-cluster.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kafka-cluster.clusterName" . }}-crd-upgrade
  labels:
    {{- include "kafka-cluster.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kafka-cluster.clusterName" . }}-crd-upgrade
subjects:
  - kind: ServiceAccount
    name: {{ include "kafka-cluster.clusterName" . }}-crd-upgrade
    namespace: {{ $namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kafka-cluster.clusterName" . }}-crd-upgrade
  namespace: {{ $namespace }}
  labels:
    {{- include "kafka-cluster.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: crd-upgrade
    spec:
      serviceAccountName: {{ include "kafka-cluster.clusterName" . }}-crd-upgrade
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: crd-upgrade
          image: {{ include "kafka-cluster.kubectlImage" . }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Applying Strimzi CRDs (v{{ .Values.strimziVersion }})..."
              CRD_URL="https://github.com/strimzi/strimzi-kafka-operator/releases/download/{{ .Values.strimziVersion }}/strimzi-crds-{{ .Values.strimziVersion }}.yaml"

              echo "Downloading CRDs from ${CRD_URL}..."
              wget -q -O /tmp/strimzi-crds.yaml "${CRD_URL}"

              echo "Applying CRDs with server-side apply..."
              kubectl apply --server-side --force-conflicts -f /tmp/strimzi-crds.yaml

              echo "Verifying CRDs..."
              for crd in kafkas.kafka.strimzi.io kafkatopics.kafka.strimzi.io kafkausers.kafka.strimzi.io kafkanodepools.kafka.strimzi.io; do
                if kubectl get crd "${crd}" > /dev/null 2>&1; then
                  echo "  ✓ ${crd}"
                else
                  echo "  ✗ ${crd} — MISSING"
                  exit 1
                fi
              done
              echo "All Strimzi CRDs applied successfully."
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
{{- end }}
