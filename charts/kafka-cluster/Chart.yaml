apiVersion: v2
name: kafka-cluster
description: Strimzi-based Kafka cluster deployment with KRaft, zone-aware broker pools, and full observability
type: application
version: 0.1.0
appVersion: "4.2.0"
icon: https://strimzi.io/assets/images/strimzi_logo.png
home: https://strimzi.io/
keywords:
  - kafka
  - strimzi
  - kraft
  - streaming
  - messaging
maintainers:
  - name: Platform Team
sources:
  - https://github.com/strimzi/strimzi-kafka-operator
dependencies:
  - name: strimzi-kafka-operator
    version: "1.0.0"
    repository: "oci://quay.io/strimzi-helm"
    condition: strimziOperator.enabled
  - name: seaweedfs
    version: "3.68.0"
    repository: "https://seaweedfs.github.io/seaweedfs/helm"
    condition: seaweedfs.enabled
