# Kind cluster overlay — layers on top of values-dev.yaml
# Usage: helm upgrade --install ... -f values-dev.yaml -f values-kind.yaml

# Zone-specific broker pools mapped to Kind node labels
brokerPools:
  - name: brokers-alpha
    zone: alpha
    replicas: 1
    storageSize: 50Gi
    storageClass: local-storage-alpha
  - name: brokers-sigma
    zone: sigma
    replicas: 1
    storageSize: 50Gi
    storageClass: local-storage-sigma
  - name: brokers-gamma
    zone: gamma
    replicas: 1
    storageSize: 50Gi
    storageClass: local-storage-gamma

# Single controllers block — previously split into two entries which caused
# the second block to silently overwrite the first (YAML last-value-wins).
# That removed tolerations, resources, and podAntiAffinity, forcing all 3
# controllers onto the 2 worker nodes and causing resource contention that
# made the Strimzi agent on port 8443 unresponsive → operator TimeoutException.
controllers:
  replicas: 3
  storage:
    size: 1Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  topologySpreadConstraints:
    # Ensure one controller per node across all 3 Kind nodes.
    # Without this, 2 controllers land on gamma causing resource contention
    # that stalls the Strimzi agent on port 8443 → operator TimeoutException.
    enabled: true
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
  podAntiAffinity:
    enabled: false
  # Toleration allows controllers to schedule on the control-plane node (alpha),
  # so 3 controllers spread across all 3 nodes instead of cramming 2 on gamma.
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

brokerDefaults:
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  topologySpreadConstraints:
    enabled: false
  podAntiAffinity:
    enabled: false
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

# Simplify listeners for local access — drop external nodeport
kafka:
  listeners:
    - name: plain
      port: 9092
      type: internal
      tls: false
      authentication:
        type: scram-sha-512
    - name: tls
      port: 9093
      type: internal
      tls: true
      authentication:
        type: tls

# Disable cloud/production features not needed locally
kafkaExporter:
  enabled: false

cruiseControl:
  enabled: false

networkPolicies:
  enabled: false

tieredStorage:
  enabled: false

backup:
  enabled: false

drainCleaner:
  enabled: false

alerts:
  enabled: false

podMonitors:
  enabled: false

dashboards:
  enabled: false

rebalance:
  enabled: false

podSecurityPolicy:
  enabled: false

# Disable CRD upgrade hook for Kind because we have it in Strimzi operator
crdUpgrade:
  enabled: false
