# ─────────────────────────────────────────────────────────────────────────────
# Resilience Test: NETWORK_LATENCY — Broker Egress Latency Injection
# ─────────────────────────────────────────────────────────────────────────────
# Adds 200ms artificial latency to all egress packets from the alpha broker
# using tc netem. Simulates a degraded cross-AZ link or WAN replication delay.
#
# Hypothesis:
#   Replication lag increases proportionally to injected latency.
#   With replica.lag.time.max.ms=30s and 200ms latency, the broker stays in ISR.
#   Producer p99 latency rises by ~networkLatencyMs × round-trips.
#   Consumer fetch latency increases. No data loss.
#
# Usage:
#   kates resilience run -f cli/examples/resilience-network-latency.yaml
# ─────────────────────────────────────────────────────────────────────────────

testRequest:
  type: LOAD
  spec:
    topic: kates-metrics
    partitions: 6
    replicationFactor: 3
    minInsyncReplicas: 2
    numRecords: 300000
    recordSize: 1024
    throughput: 3000
    numProducers: 3
    numConsumers: 2
    consumerGroup: latency-inject-cg
    acks: "all"
    enableIdempotence: true
    batchSize: 65536
    lingerMs: 5
    compressionType: lz4

chaosSpec:
  experimentName: network-latency-alpha
  disruptionType: NETWORK_LATENCY
  targetNamespace: kafka
  targetLabel: "strimzi.io/pool-name=brokers-alpha"
  chaosDurationSec: 90
  delayBeforeSec: 0
  networkLatencyMs: 200     # inject 200ms round-trip on all egress

steadyStateSec: 20
maxRecoveryWaitSec: 90

probes:
  - name: isr-health-check
    type: cmdProbe
    mode: Continuous
    command: "kafka-topics.sh --bootstrap-server localhost:9092 --describe --under-replicated-partitions 2>/dev/null | grep -c 'Topic:' || echo '0'"
    expectedOutput: "50"
    comparator: "<="
    intervalSec: 10
    timeoutSec: 30

  - name: partition-availability
    type: cmdProbe
    mode: Continuous
    command: "kafka-topics.sh --bootstrap-server localhost:9092 --describe --unavailable-partitions 2>/dev/null | grep -c 'Topic:' || echo '0'"
    expectedOutput: "0"
    comparator: "=="
    intervalSec: 10
    timeoutSec: 30
