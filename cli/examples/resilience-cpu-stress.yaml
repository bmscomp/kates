# ─────────────────────────────────────────────────────────────────────────────
# Resilience Test: CPU_STRESS — Broker CPU Saturation
# ─────────────────────────────────────────────────────────────────────────────
# Pegs 1 CPU core at 90% on the gamma broker while heavy producers run.
# Observes ISR shrink/expand cycle caused by replication lag under CPU pressure.
#
# Hypothesis:
#   CPU-starved follower replication lag rises above replica.lag.time.max.ms (30s).
#   gamma is evicted from ISR. Producers stall with acks=all until ISR recovers.
#   ISR returns to 3/3 within 90s of chaos ending.
#
# Usage:
#   kates resilience run -f cli/examples/resilience-cpu-stress.yaml
# ─────────────────────────────────────────────────────────────────────────────

testRequest:
  type: LOAD
  spec:
    topic: kates-results
    partitions: 6
    replicationFactor: 3
    minInsyncReplicas: 2
    numRecords: 300000
    recordSize: 8192          # 8 KB — large records amplify CPU pressure
    throughput: 1000
    numProducers: 6
    acks: "all"
    enableIdempotence: true
    batchSize: 131072
    lingerMs: 10
    compressionType: snappy   # snappy is CPU-bound — adds to broker pressure

chaosSpec:
  experimentName: cpu-saturation-gamma
  disruptionType: CPU_STRESS
  targetNamespace: kafka
  targetLabel: "strimzi.io/pool-name=brokers-gamma"
  chaosDurationSec: 120
  delayBeforeSec: 0
  cpuCores: 1                 # hog 1 core at 90%

steadyStateSec: 20
maxRecoveryWaitSec: 90

probes:
  - name: isr-health-check
    type: cmdProbe
    mode: Continuous
    command: "kafka-topics.sh --bootstrap-server localhost:9092 --describe --under-replicated-partitions 2>/dev/null | grep -c 'Topic:' || echo '0'"
    expectedOutput: "50"
    comparator: "<="
    intervalSec: 10
    timeoutSec: 30

  - name: producer-throughput
    type: cmdProbe
    mode: Continuous
    command: "kafka-producer-perf-test.sh --topic kates-probe-topic --num-records 10 --record-size 100 --throughput -1 --producer-props bootstrap.servers=localhost:9092 2>/dev/null | tail -1 | awk '{print $6}'"
    expectedOutput: "0"
    comparator: ">"
    intervalSec: 15
    timeoutSec: 30
