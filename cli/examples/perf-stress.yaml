# ─────────────────────────────────────────────────────────────────────────────
# Performance Test: STRESS — Throughput Saturation Curve
# ─────────────────────────────────────────────────────────────────────────────
# Runs 4 sequential scenarios at increasing throughput to find the knee of the
# latency curve. Each step increases load until SLA is breached.
#
# Usage:  kates test apply -f cli/examples/perf-stress.yaml --wait
# ─────────────────────────────────────────────────────────────────────────────
scenarios:
  - name: "Stress — 5k msg/s"
    type: STRESS
    spec:
      topic: kates-results
      partitions: 6
      replicationFactor: 3
      minInsyncReplicas: 2
      numRecords: 500000
      recordSize: 1024
      throughput: 5000
      numProducers: 3
      acks: "all"
      enableIdempotence: true
      batchSize: 131072
      lingerMs: 10
      compressionType: snappy
    validate:
      maxP99LatencyMs: 200
      maxErrorRate: 1.0

  - name: "Stress — 15k msg/s"
    type: STRESS
    spec:
      topic: kates-results
      partitions: 6
      replicationFactor: 3
      minInsyncReplicas: 2
      numRecords: 500000
      recordSize: 1024
      throughput: 15000
      numProducers: 3
      acks: "all"
      enableIdempotence: true
      batchSize: 131072
      lingerMs: 10
      compressionType: snappy
    validate:
      maxP99LatencyMs: 300
      maxErrorRate: 1.0

  - name: "Stress — 30k msg/s"
    type: STRESS
    spec:
      topic: kates-results
      partitions: 6
      replicationFactor: 3
      minInsyncReplicas: 2
      numRecords: 500000
      recordSize: 1024
      throughput: 30000
      numProducers: 4
      acks: "all"
      enableIdempotence: true
      batchSize: 131072
      lingerMs: 10
      compressionType: snappy
    validate:
      maxP99LatencyMs: 500
      maxErrorRate: 1.0

  - name: "Stress — unlimited (find ceiling)"
    type: STRESS
    spec:
      topic: kates-results
      partitions: 6
      replicationFactor: 3
      minInsyncReplicas: 2
      numRecords: 500000
      recordSize: 1024
      throughput: -1            # no cap — saturate the cluster
      numProducers: 6
      acks: "all"
      enableIdempotence: true
      batchSize: 131072
      lingerMs: 10
      compressionType: snappy
    validate:
      minThroughputRecPerSec: 5000  # fail only if below 5k even uncapped
      maxErrorRate: 5.0
