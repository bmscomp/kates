# ─────────────────────────────────────────────────────────────────────────────
# Performance Test: CAPACITY — Maximum Sustainable Throughput Discovery
# ─────────────────────────────────────────────────────────────────────────────
# Runs 3 sequential scenarios stepping from a known-safe load to unlimited,
# then backs off to confirm stability at the observed ceiling.
#
# Usage:  kates test apply -f cli/examples/perf-capacity.yaml --wait
# ─────────────────────────────────────────────────────────────────────────────
scenarios:
  - name: "Capacity — ramp 10k msg/s"
    type: CAPACITY
    spec:
      topic: kates-events
      partitions: 12
      replicationFactor: 3
      minInsyncReplicas: 2
      numRecords: 600000
      recordSize: 1024
      throughput: 10000
      numProducers: 6
      numConsumers: 3
      consumerGroup: capacity-cg
      acks: "all"
      enableIdempotence: true
      batchSize: 131072
      lingerMs: 10
      compressionType: lz4
    validate:
      maxP99LatencyMs: 500
      maxErrorRate: 1.0

  - name: "Capacity — unlimited (find ceiling)"
    type: CAPACITY
    spec:
      topic: kates-events
      partitions: 12
      replicationFactor: 3
      minInsyncReplicas: 2
      numRecords: 600000
      recordSize: 1024
      throughput: -1            # no cap
      numProducers: 6
      numConsumers: 3
      consumerGroup: capacity-cg
      acks: "all"
      enableIdempotence: true
      batchSize: 131072
      lingerMs: 10
      compressionType: lz4
    validate:
      minThroughputRecPerSec: 10000   # fail if ceiling < 10k msg/s
      maxErrorRate: 1.0

  - name: "Capacity — back-off validation at 20k msg/s"
    type: CAPACITY
    spec:
      topic: kates-events
      partitions: 12
      replicationFactor: 3
      minInsyncReplicas: 2
      numRecords: 300000
      recordSize: 1024
      throughput: 20000
      numProducers: 6
      numConsumers: 3
      consumerGroup: capacity-cg
      acks: "all"
      enableIdempotence: true
      batchSize: 131072
      lingerMs: 10
      compressionType: lz4
    validate:
      maxP99LatencyMs: 500
      minThroughputRecPerSec: 18000   # must sustain 90% of target
      maxErrorRate: 0.5
