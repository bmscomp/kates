# ─────────────────────────────────────────────────────────────────────────────
# Performance Test: INTEGRITY — Exactly-Once Delivery Verification
# ─────────────────────────────────────────────────────────────────────────────
# Usage:  kates test apply -f cli/examples/perf-integrity.yaml --wait
# ─────────────────────────────────────────────────────────────────────────────
scenarios:
  - name: "Integrity — transactional EOS, CRC enabled"
    type: INTEGRITY
    spec:
      topic: kates-dlq
      partitions: 3
      replicationFactor: 3
      minInsyncReplicas: 2
      numRecords: 200000
      recordSize: 512
      throughput: 2000
      numProducers: 2
      numConsumers: 2
      consumerGroup: integrity-cg
      acks: "all"
      enableIdempotence: true
      enableTransactions: true  # exactly-once semantics
      enableCrc: true           # bit-level payload integrity
      batchSize: 65536
      lingerMs: 5
      compressionType: lz4
    validate:
      maxDataLossPercent: 0.0
      maxErrorRate: 0.0
      maxCrcFailures: 0
      maxOutOfOrder: 0
      maxP99LatencyMs: 500      # transactions add ~10-20ms overhead
