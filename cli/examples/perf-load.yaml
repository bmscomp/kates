# ─────────────────────────────────────────────────────────────────────────────
# Performance Test: LOAD — Baseline Throughput
# ─────────────────────────────────────────────────────────────────────────────
# Usage:  kates test apply -f cli/examples/perf-load.yaml [--wait]
# ─────────────────────────────────────────────────────────────────────────────
scenarios:
  - name: "Baseline Load — 3 producers, lz4, acks=all"
    type: LOAD
    spec:
      topic: kates-events
      partitions: 6
      replicationFactor: 3
      minInsyncReplicas: 2
      numRecords: 1000000
      recordSize: 1024
      throughput: 10000         # cap at 10 k msg/s; set -1 for unlimited
      numProducers: 3
      numConsumers: 2
      consumerGroup: load-test-cg
      acks: "all"
      enableIdempotence: true
      batchSize: 65536
      lingerMs: 5
      compressionType: lz4
      fetchMinBytes: 1
      fetchMaxWaitMs: 500
    validate:
      maxP99LatencyMs: 200
      maxAvgLatencyMs: 50
      minThroughputRecPerSec: 8000
      maxErrorRate: 0.0
