# ─────────────────────────────────────────────────────────────────────────────
# Performance Test: SPIKE — Burst After Idle
# ─────────────────────────────────────────────────────────────────────────────
# Usage:  kates test apply -f cli/examples/perf-spike.yaml --wait
# ─────────────────────────────────────────────────────────────────────────────
scenarios:
  - name: "Spike — idle baseline"
    type: SPIKE
    spec:
      topic: kates-events
      partitions: 6
      replicationFactor: 3
      minInsyncReplicas: 2
      numRecords: 30000
      recordSize: 512
      throughput: 500
      numProducers: 2
      numConsumers: 2
      consumerGroup: spike-cg
      acks: "all"
      enableIdempotence: true
      batchSize: 65536
      lingerMs: 5
      compressionType: lz4
    validate:
      maxP99LatencyMs: 100
      maxErrorRate: 0.0

  - name: "Spike — unlimited burst"
    type: SPIKE
    spec:
      topic: kates-events
      partitions: 6
      replicationFactor: 3
      minInsyncReplicas: 2
      numRecords: 300000
      recordSize: 512
      throughput: -1            # maximum burst
      numProducers: 4
      numConsumers: 2
      consumerGroup: spike-cg
      acks: "all"
      enableIdempotence: true
      batchSize: 65536
      lingerMs: 5
      compressionType: lz4
    validate:
      maxP99LatencyMs: 1000     # spikes tolerate higher latency
      maxErrorRate: 0.5         # brief quota rejections allowed
      maxDataLossPercent: 0.0

  - name: "Spike — post-burst recovery"
    type: SPIKE
    spec:
      topic: kates-events
      partitions: 6
      replicationFactor: 3
      minInsyncReplicas: 2
      numRecords: 180000
      recordSize: 512
      throughput: 3000
      numProducers: 2
      numConsumers: 2
      consumerGroup: spike-cg
      acks: "all"
      enableIdempotence: true
      batchSize: 65536
      lingerMs: 5
      compressionType: lz4
    validate:
      maxP99LatencyMs: 200
      minThroughputRecPerSec: 2500
      maxErrorRate: 0.0
