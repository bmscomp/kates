# ─────────────────────────────────────────────────────────────────────────────
# Performance Test: ENDURANCE — Long-Running Soak
# ─────────────────────────────────────────────────────────────────────────────
# Usage:  kates test apply -f cli/examples/perf-endurance.yaml --wait
# ─────────────────────────────────────────────────────────────────────────────
scenarios:
  - name: "Endurance Soak — 10 min at 6k msg/s"
    type: ENDURANCE
    spec:
      topic: kates-metrics
      partitions: 6
      replicationFactor: 3
      minInsyncReplicas: 2
      duration: 600             # 600s = 10 min (passed via durationMs on the server)
      numRecords: 3600000
      recordSize: 1024
      throughput: 6000
      numProducers: 3
      numConsumers: 3
      consumerGroup: soak-cg
      acks: "all"
      enableIdempotence: true
      batchSize: 65536
      lingerMs: 5
      compressionType: lz4
      fetchMinBytes: 65536
      fetchMaxWaitMs: 500
    validate:
      maxP99LatencyMs: 300
      maxAvgLatencyMs: 75
      minThroughputRecPerSec: 5500
      maxErrorRate: 0.1
      maxDataLossPercent: 0.0
