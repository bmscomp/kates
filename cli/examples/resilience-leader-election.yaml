# ─────────────────────────────────────────────────────────────────────────────
# Resilience Test: LEADER_ELECTION — Forced Partition Leader Re-election
# ─────────────────────────────────────────────────────────────────────────────
# Triggers manual leader re-election on all partitions of a topic, simulating
# the effect of a KRaft controller failover or a preferredLeaderElection run.
# Tests that producers handle the metadata refresh and reconnection correctly.
#
# Hypothesis:
#   Leader election takes < 5s per partition on a healthy 3-broker cluster.
#   Producers with acks=all see brief latency spikes per partition re-election.
#   No data loss. Consumer groups continue without triggering a full rebalance.
#
# Usage:
#   kates resilience run -f cli/examples/resilience-leader-election.yaml
# ─────────────────────────────────────────────────────────────────────────────

testRequest:
  type: LOAD
  spec:
    topic: kates-events
    partitions: 6
    replicationFactor: 3
    minInsyncReplicas: 2
    numRecords: 300000
    recordSize: 1024
    throughput: 3000
    numProducers: 3
    numConsumers: 2
    consumerGroup: leader-election-cg
    acks: "all"
    enableIdempotence: true
    batchSize: 65536
    lingerMs: 5
    compressionType: lz4

chaosSpec:
  experimentName: forced-leader-election
  disruptionType: LEADER_ELECTION
  targetNamespace: kafka
  targetLabel: "strimzi.io/cluster=krafter"
  chaosDurationSec: 30
  delayBeforeSec: 0
  targetTopic: kates-events
  targetPartition: -1       # -1 = all partitions of the topic

steadyStateSec: 20
maxRecoveryWaitSec: 60

probes:
  - name: partition-availability
    type: cmdProbe
    mode: Edge
    command: "kafka-topics.sh --bootstrap-server localhost:9092 --describe --unavailable-partitions 2>/dev/null | grep -c 'Topic:' || echo '0'"
    expectedOutput: "0"
    comparator: "=="
    intervalSec: 5
    timeoutSec: 30

  - name: isr-health-check
    type: cmdProbe
    mode: Continuous
    command: "kafka-topics.sh --bootstrap-server localhost:9092 --describe --under-replicated-partitions 2>/dev/null | grep -c 'Topic:' || echo '0'"
    expectedOutput: "50"
    comparator: "<="
    intervalSec: 10
    timeoutSec: 30
