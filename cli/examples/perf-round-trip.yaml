# ─────────────────────────────────────────────────────────────────────────────
# Performance Test: ROUND_TRIP — End-to-End Latency Benchmark
# ─────────────────────────────────────────────────────────────────────────────
# Usage:  kates test apply -f cli/examples/perf-round-trip.yaml --wait
# ─────────────────────────────────────────────────────────────────────────────
scenarios:
  - name: "Round-trip latency — linger=0, no compression"
    type: ROUND_TRIP
    spec:
      topic: kates-metrics
      partitions: 3
      replicationFactor: 3
      minInsyncReplicas: 2
      numRecords: 50000
      recordSize: 256
      throughput: 1000
      numProducers: 1
      numConsumers: 1
      consumerGroup: round-trip-cg
      acks: "all"
      enableIdempotence: true
      batchSize: 16384          # small batch — reduce buffering latency
      lingerMs: 0               # no artificial delay
      compressionType: none
      fetchMinBytes: 1          # return immediately
      fetchMaxWaitMs: 0
    validate:
      maxP99LatencyMs: 50
      maxAvgLatencyMs: 10
      maxErrorRate: 0.0
      minThroughputRecPerSec: 900
