# ─────────────────────────────────────────────────────────────────────────────
# Performance Test: VOLUME — Large Message Payload Throughput
# ─────────────────────────────────────────────────────────────────────────────
# Usage:  kates test apply -f cli/examples/perf-volume.yaml --wait
# ─────────────────────────────────────────────────────────────────────────────
scenarios:
  - name: "Volume — 64 KB payloads, snappy"
    type: VOLUME
    spec:
      topic: kates-audit
      partitions: 3
      replicationFactor: 3
      minInsyncReplicas: 2
      numRecords: 100000
      recordSize: 65536         # 64 KB
      throughput: 500           # 500 × 64 KB ≈ 32 MB/s
      numProducers: 2
      numConsumers: 1
      consumerGroup: volume-cg
      acks: "all"
      enableIdempotence: true
      batchSize: 1048576        # 1 MB — must be ≥ recordSize
      lingerMs: 20
      compressionType: snappy
      fetchMinBytes: 1048576
      fetchMaxWaitMs: 500
    validate:
      maxP99LatencyMs: 2000
      maxAvgLatencyMs: 500
      minThroughputRecPerSec: 400
      maxErrorRate: 0.0
      maxDataLossPercent: 0.0
