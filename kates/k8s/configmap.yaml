apiVersion: v1
kind: ConfigMap
metadata:
  name: kates-config
  namespace: kates
  labels:
    app: kates
    app.kubernetes.io/name: kates
    app.kubernetes.io/part-of: klster
data:
  # Kafka cluster
  KATES_KAFKA_BOOTSTRAP_SERVERS: "krafter-kafka-bootstrap.kafka.svc:9092"
  KATES_KAFKA_SECURITY_PROTOCOL: "SASL_PLAINTEXT"
  KATES_KAFKA_SASL_MECHANISM: "SCRAM-SHA-512"
  KATES_KAFKA_SASL_USERNAME: "kates-backend"
  KATES_TROGDOR_COORDINATOR_URL: "http://trogdor-coordinator.kafka.svc:8889"

  # API security
  # Set KATES_API_SECURITY_ENABLED=false to disable auth entirely (dev only).
  # Change KATES_API_KEY to a strong random value before exposing externally.
  KATES_API_SECURITY_ENABLED: "true"
  KATES_API_KEY: "changeme"

  # Benchmark engine (native | trogdor)
  KATES_ENGINE_DEFAULT_BACKEND: "native"

  # PostgreSQL datasource
  QUARKUS_DATASOURCE_DB_KIND: "postgresql"
  QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://postgres.kates.svc:5432/kates"
  QUARKUS_DATASOURCE_USERNAME: "kates"
  QUARKUS_DATASOURCE_PASSWORD: "kates"
  QUARKUS_DATASOURCE_JDBC_MAX_SIZE: "20"
  QUARKUS_HIBERNATE_ORM_SCHEMA_MANAGEMENT_STRATEGY: "none"
  QUARKUS_HIBERNATE_ORM_LOG_SQL: "false"
  QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
  QUARKUS_FLYWAY_BASELINE_ON_MIGRATE: "true"

  # Global defaults (fallback for all test types)
  KATES_DEFAULTS_REPLICATION_FACTOR: "3"
  KATES_DEFAULTS_PARTITIONS: "3"
  KATES_DEFAULTS_MIN_INSYNC_REPLICAS: "2"
  KATES_DEFAULTS_ACKS: "all"
  KATES_DEFAULTS_BATCH_SIZE: "65536"
  KATES_DEFAULTS_LINGER_MS: "5"
  KATES_DEFAULTS_COMPRESSION_TYPE: "lz4"
  KATES_DEFAULTS_RECORD_SIZE: "1024"
  KATES_DEFAULTS_NUM_RECORDS: "1000000"
  KATES_DEFAULTS_THROUGHPUT: "-1"
  KATES_DEFAULTS_DURATION_MS: "600000"
  KATES_DEFAULTS_NUM_PRODUCERS: "1"
  KATES_DEFAULTS_NUM_CONSUMERS: "1"

  # LOAD — baseline throughput test
  KATES_TESTS_LOAD_REPLICATION_FACTOR: "3"
  KATES_TESTS_LOAD_PARTITIONS: "3"
  KATES_TESTS_LOAD_MIN_INSYNC_REPLICAS: "2"
  KATES_TESTS_LOAD_ACKS: "all"
  KATES_TESTS_LOAD_BATCH_SIZE: "65536"
  KATES_TESTS_LOAD_LINGER_MS: "5"
  KATES_TESTS_LOAD_COMPRESSION_TYPE: "lz4"
  KATES_TESTS_LOAD_RECORD_SIZE: "1024"
  KATES_TESTS_LOAD_NUM_RECORDS: "1000000"
  KATES_TESTS_LOAD_THROUGHPUT: "-1"
  KATES_TESTS_LOAD_DURATION_MS: "600000"
  KATES_TESTS_LOAD_NUM_PRODUCERS: "1"
  KATES_TESTS_LOAD_NUM_CONSUMERS: "1"

  # STRESS — high-concurrency, large batches
  KATES_TESTS_STRESS_REPLICATION_FACTOR: "3"
  KATES_TESTS_STRESS_PARTITIONS: "6"
  KATES_TESTS_STRESS_MIN_INSYNC_REPLICAS: "2"
  KATES_TESTS_STRESS_ACKS: "all"
  KATES_TESTS_STRESS_BATCH_SIZE: "131072"
  KATES_TESTS_STRESS_LINGER_MS: "10"
  KATES_TESTS_STRESS_COMPRESSION_TYPE: "lz4"
  KATES_TESTS_STRESS_RECORD_SIZE: "1024"
  KATES_TESTS_STRESS_NUM_RECORDS: "5000000"
  KATES_TESTS_STRESS_THROUGHPUT: "-1"
  KATES_TESTS_STRESS_DURATION_MS: "900000"
  KATES_TESTS_STRESS_NUM_PRODUCERS: "3"
  KATES_TESTS_STRESS_NUM_CONSUMERS: "1"

  # SPIKE — burst traffic, low-latency
  KATES_TESTS_SPIKE_REPLICATION_FACTOR: "3"
  KATES_TESTS_SPIKE_PARTITIONS: "3"
  KATES_TESTS_SPIKE_MIN_INSYNC_REPLICAS: "2"
  KATES_TESTS_SPIKE_ACKS: "1"
  KATES_TESTS_SPIKE_BATCH_SIZE: "131072"
  KATES_TESTS_SPIKE_LINGER_MS: "0"
  KATES_TESTS_SPIKE_COMPRESSION_TYPE: "none"
  KATES_TESTS_SPIKE_RECORD_SIZE: "1024"
  KATES_TESTS_SPIKE_NUM_RECORDS: "2000000"
  KATES_TESTS_SPIKE_THROUGHPUT: "-1"
  KATES_TESTS_SPIKE_DURATION_MS: "300000"
  KATES_TESTS_SPIKE_NUM_PRODUCERS: "1"
  KATES_TESTS_SPIKE_NUM_CONSUMERS: "1"

  # ENDURANCE — long-running, rate-limited
  KATES_TESTS_ENDURANCE_REPLICATION_FACTOR: "3"
  KATES_TESTS_ENDURANCE_PARTITIONS: "3"
  KATES_TESTS_ENDURANCE_MIN_INSYNC_REPLICAS: "2"
  KATES_TESTS_ENDURANCE_ACKS: "all"
  KATES_TESTS_ENDURANCE_BATCH_SIZE: "65536"
  KATES_TESTS_ENDURANCE_LINGER_MS: "5"
  KATES_TESTS_ENDURANCE_COMPRESSION_TYPE: "lz4"
  KATES_TESTS_ENDURANCE_RECORD_SIZE: "1024"
  KATES_TESTS_ENDURANCE_NUM_RECORDS: "10000000"
  KATES_TESTS_ENDURANCE_THROUGHPUT: "5000"
  KATES_TESTS_ENDURANCE_DURATION_MS: "3600000"
  KATES_TESTS_ENDURANCE_NUM_PRODUCERS: "1"
  KATES_TESTS_ENDURANCE_NUM_CONSUMERS: "1"

  # VOLUME — large records, high batch size
  KATES_TESTS_VOLUME_REPLICATION_FACTOR: "3"
  KATES_TESTS_VOLUME_PARTITIONS: "6"
  KATES_TESTS_VOLUME_MIN_INSYNC_REPLICAS: "2"
  KATES_TESTS_VOLUME_ACKS: "all"
  KATES_TESTS_VOLUME_BATCH_SIZE: "262144"
  KATES_TESTS_VOLUME_LINGER_MS: "50"
  KATES_TESTS_VOLUME_COMPRESSION_TYPE: "lz4"
  KATES_TESTS_VOLUME_RECORD_SIZE: "10240"
  KATES_TESTS_VOLUME_NUM_RECORDS: "2000000"
  KATES_TESTS_VOLUME_THROUGHPUT: "-1"
  KATES_TESTS_VOLUME_DURATION_MS: "600000"
  KATES_TESTS_VOLUME_NUM_PRODUCERS: "1"
  KATES_TESTS_VOLUME_NUM_CONSUMERS: "1"

  # CAPACITY — max parallelism
  KATES_TESTS_CAPACITY_REPLICATION_FACTOR: "3"
  KATES_TESTS_CAPACITY_PARTITIONS: "12"
  KATES_TESTS_CAPACITY_MIN_INSYNC_REPLICAS: "2"
  KATES_TESTS_CAPACITY_ACKS: "all"
  KATES_TESTS_CAPACITY_BATCH_SIZE: "131072"
  KATES_TESTS_CAPACITY_LINGER_MS: "10"
  KATES_TESTS_CAPACITY_COMPRESSION_TYPE: "lz4"
  KATES_TESTS_CAPACITY_RECORD_SIZE: "1024"
  KATES_TESTS_CAPACITY_NUM_RECORDS: "10000000"
  KATES_TESTS_CAPACITY_THROUGHPUT: "-1"
  KATES_TESTS_CAPACITY_DURATION_MS: "1200000"
  KATES_TESTS_CAPACITY_NUM_PRODUCERS: "5"
  KATES_TESTS_CAPACITY_NUM_CONSUMERS: "1"

  # ROUND_TRIP — latency-focused
  KATES_TESTS_ROUNDTRIP_REPLICATION_FACTOR: "3"
  KATES_TESTS_ROUNDTRIP_PARTITIONS: "3"
  KATES_TESTS_ROUNDTRIP_MIN_INSYNC_REPLICAS: "2"
  KATES_TESTS_ROUNDTRIP_ACKS: "all"
  KATES_TESTS_ROUNDTRIP_BATCH_SIZE: "16384"
  KATES_TESTS_ROUNDTRIP_LINGER_MS: "0"
  KATES_TESTS_ROUNDTRIP_COMPRESSION_TYPE: "none"
  KATES_TESTS_ROUNDTRIP_RECORD_SIZE: "1024"
  KATES_TESTS_ROUNDTRIP_NUM_RECORDS: "500000"
  KATES_TESTS_ROUNDTRIP_THROUGHPUT: "10000"
  KATES_TESTS_ROUNDTRIP_DURATION_MS: "600000"
  KATES_TESTS_ROUNDTRIP_NUM_PRODUCERS: "1"
  KATES_TESTS_ROUNDTRIP_NUM_CONSUMERS: "1"

  # Fault Tolerance — configurable timeouts (ms)
  # TopicService
  COM_BMSCOMP_KATES_SERVICE_TOPICSERVICE_CREATETOPIC_TIMEOUT_VALUE: "35000"
  COM_BMSCOMP_KATES_SERVICE_TOPICSERVICE_DELETETOPIC_TIMEOUT_VALUE: "35000"
  COM_BMSCOMP_KATES_SERVICE_TOPICSERVICE_ALTERTOPICCONFIG_TIMEOUT_VALUE: "35000"
  COM_BMSCOMP_KATES_SERVICE_TOPICSERVICE_LISTTOPICS_TIMEOUT_VALUE: "35000"
  COM_BMSCOMP_KATES_SERVICE_TOPICSERVICE_DESCRIBETOPICS_TIMEOUT_VALUE: "35000"
  COM_BMSCOMP_KATES_SERVICE_TOPICSERVICE_DESCRIBETOPICDETAIL_TIMEOUT_VALUE: "35000"
  # ClusterHealthService
  COM_BMSCOMP_KATES_SERVICE_CLUSTERHEALTHSERVICE_DESCRIBECLUSTER_TIMEOUT_VALUE: "35000"
  COM_BMSCOMP_KATES_SERVICE_CLUSTERHEALTHSERVICE_ISREACHABLE_TIMEOUT_VALUE: "10000"
  COM_BMSCOMP_KATES_SERVICE_CLUSTERHEALTHSERVICE_DESCRIBEBROKERCONFIGS_TIMEOUT_VALUE: "35000"
  COM_BMSCOMP_KATES_SERVICE_CLUSTERHEALTHSERVICE_CAPTURESNAPSHOT_TIMEOUT_VALUE: "35000"
  COM_BMSCOMP_KATES_SERVICE_CLUSTERHEALTHSERVICE_CLUSTERHEALTHCHECK_TIMEOUT_VALUE: "60000"
  # ConsumerGroupService
  COM_BMSCOMP_KATES_SERVICE_CONSUMERGROUPSERVICE_LISTCONSUMERGROUPS_TIMEOUT_VALUE: "35000"
  COM_BMSCOMP_KATES_SERVICE_CONSUMERGROUPSERVICE_DESCRIBECONSUMERGROUP_TIMEOUT_VALUE: "35000"

