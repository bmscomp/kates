apiVersion: apps/v1
kind: Deployment
metadata:
  name: kates
  namespace: kates
  labels:
    app: kates
    app.kubernetes.io/name: kates
    app.kubernetes.io/part-of: klster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kates
  template:
    metadata:
      labels:
        app: kates
    spec:
      serviceAccountName: kates
      containers:
      - name: kates
        image: kates:jvm-v2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: kates-config
        env:
        - name: KATES_KAFKA_SASL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kates-kafka-credentials
              key: password
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 5
          timeoutSeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /q/health/live
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
