# Kafka cluster (Strimzi krafter)
kates.kafka.bootstrap-servers=krafter-kafka-bootstrap.kafka.svc:9092

# Trogdor Coordinator
kates.trogdor.coordinator-url=http://trogdor-coordinator:8889

# Benchmark engine (native | trogdor)
kates.engine.default-backend=native

# Default test parameters
kates.defaults.replication-factor=3
kates.defaults.partitions=3
kates.defaults.min-insync-replicas=2
kates.defaults.acks=all
kates.defaults.batch-size=65536
kates.defaults.linger-ms=5
kates.defaults.compression-type=lz4
kates.defaults.record-size=1024

# REST Client config
quarkus.rest-client."com.klster.kates.trogdor.TrogdorClient".url=${kates.trogdor.coordinator-url}
quarkus.rest-client."com.klster.kates.trogdor.TrogdorClient".connect-timeout=5000
quarkus.rest-client."com.klster.kates.trogdor.TrogdorClient".read-timeout=30000

# HTTP
quarkus.http.port=8080
quarkus.http.cors.origins=*

# OpenAPI
quarkus.smallrye-openapi.info-title=KATES API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Kafka Advanced Testing & Engineering Suite
