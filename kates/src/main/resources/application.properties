# Kafka cluster (Strimzi krafter)
kates.kafka.bootstrap-servers=krafter-kafka-bootstrap.kafka.svc:9092

# Trogdor Coordinator
kates.trogdor.coordinator-url=http://trogdor-coordinator:8889

# Benchmark engine (native | trogdor)
kates.engine.default-backend=native

# Global test defaults (fallback for any test type)
kates.defaults.replication-factor=3
kates.defaults.partitions=3
kates.defaults.min-insync-replicas=2
kates.defaults.acks=all
kates.defaults.batch-size=65536
kates.defaults.linger-ms=5
kates.defaults.compression-type=lz4
kates.defaults.record-size=1024
kates.defaults.num-records=1000000
kates.defaults.throughput=-1
kates.defaults.duration-ms=600000
kates.defaults.num-producers=1
kates.defaults.num-consumers=1

# Per-type overrides: STRESS — high concurrency, large batches
kates.tests.stress.partitions=6
kates.tests.stress.batch-size=131072
kates.tests.stress.linger-ms=10
kates.tests.stress.num-records=5000000
kates.tests.stress.duration-ms=900000
kates.tests.stress.num-producers=3

# Per-type overrides: SPIKE — burst traffic, low-latency settings
kates.tests.spike.acks=1
kates.tests.spike.batch-size=131072
kates.tests.spike.linger-ms=0
kates.tests.spike.compression-type=none
kates.tests.spike.num-records=2000000
kates.tests.spike.duration-ms=300000

# Per-type overrides: ENDURANCE — long-running, rate-limited
kates.tests.endurance.num-records=10000000
kates.tests.endurance.throughput=5000
kates.tests.endurance.duration-ms=3600000

# Per-type overrides: VOLUME — large records, high batch size
kates.tests.volume.partitions=6
kates.tests.volume.batch-size=262144
kates.tests.volume.linger-ms=50
kates.tests.volume.record-size=10240
kates.tests.volume.num-records=2000000

# Per-type overrides: CAPACITY — max parallelism
kates.tests.capacity.partitions=12
kates.tests.capacity.batch-size=131072
kates.tests.capacity.linger-ms=10
kates.tests.capacity.num-records=10000000
kates.tests.capacity.duration-ms=1200000
kates.tests.capacity.num-producers=5

# Per-type overrides: ROUND_TRIP — latency-focused
kates.tests.roundtrip.batch-size=16384
kates.tests.roundtrip.linger-ms=0
kates.tests.roundtrip.compression-type=none
kates.tests.roundtrip.num-records=500000
kates.tests.roundtrip.throughput=10000

# REST Client config
quarkus.rest-client."com.klster.kates.trogdor.TrogdorClient".url=${kates.trogdor.coordinator-url}
quarkus.rest-client."com.klster.kates.trogdor.TrogdorClient".connect-timeout=5000
quarkus.rest-client."com.klster.kates.trogdor.TrogdorClient".read-timeout=30000

# HTTP
quarkus.http.port=8080
quarkus.http.cors.origins=*

# OpenAPI
quarkus.smallrye-openapi.info-title=Kates API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Kafka Advanced Testing & Engineering Suite

# Micrometer → Prometheus
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true

# OpenTelemetry
quarkus.otel.enabled=true
quarkus.otel.service.name=kates
quarkus.otel.traces.exporter=none
quarkus.otel.metrics.exporter=none
quarkus.otel.logs.exporter=none

# Structured JSON logging
quarkus.log.console.json=true
quarkus.log.console.json.additional-field."service".value=kates
quarkus.log.console.json.additional-field."version".value=1.0.0

# Chaos coordination (noop | litmus-crd)
kates.chaos.provider=litmus-crd

# Kubernetes client (auto-configured when running in-cluster)
quarkus.kubernetes-client.trust-certs=true
quarkus.kubernetes-client.devservices.enabled=false

# PostgreSQL datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://postgres.kates.svc:5432/kates
quarkus.datasource.username=kates
quarkus.datasource.password=kates
quarkus.datasource.jdbc.max-size=16

# Hibernate ORM
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# Prometheus server (for disruption metrics capture)
kates.prometheus.url=http://prometheus.monitoring.svc:9090
