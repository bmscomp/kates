# Test profile overrides
kates.kafka.bootstrap-servers=localhost:9092
kates.trogdor.coordinator-url=http://localhost:8889
kates.engine.default-backend=native

kates.defaults.replication-factor=3
kates.defaults.partitions=3
kates.defaults.min-insync-replicas=2
kates.defaults.acks=all
kates.defaults.batch-size=65536
kates.defaults.linger-ms=5
kates.defaults.compression-type=lz4
kates.defaults.record-size=1024

quarkus.rest-client."com.klster.kates.trogdor.TrogdorClient".url=http://localhost:8889

quarkus.log.level=WARN
