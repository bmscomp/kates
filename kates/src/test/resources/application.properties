# Test profile overrides
kates.kafka.bootstrap-servers=localhost:9092
kates.trogdor.coordinator-url=http://localhost:8889
kates.engine.default-backend=native

# Global defaults
kates.defaults.replication-factor=3
kates.defaults.partitions=3
kates.defaults.min-insync-replicas=2
kates.defaults.acks=all
kates.defaults.batch-size=65536
kates.defaults.linger-ms=5
kates.defaults.compression-type=lz4
kates.defaults.record-size=1024
kates.defaults.num-records=1000000
kates.defaults.throughput=-1
kates.defaults.duration-ms=600000
kates.defaults.num-producers=1
kates.defaults.num-consumers=1

# Per-type test overrides (match main config)
kates.tests.stress.partitions=6
kates.tests.stress.batch-size=131072
kates.tests.stress.linger-ms=10
kates.tests.stress.num-records=5000000
kates.tests.stress.duration-ms=900000
kates.tests.stress.num-producers=3

kates.tests.spike.acks=1
kates.tests.spike.batch-size=131072
kates.tests.spike.linger-ms=0
kates.tests.spike.compression-type=none
kates.tests.spike.num-records=2000000
kates.tests.spike.duration-ms=300000

kates.tests.endurance.num-records=10000000
kates.tests.endurance.throughput=5000
kates.tests.endurance.duration-ms=3600000

kates.tests.volume.partitions=6
kates.tests.volume.batch-size=262144
kates.tests.volume.linger-ms=50
kates.tests.volume.record-size=10240
kates.tests.volume.num-records=2000000

kates.tests.capacity.partitions=12
kates.tests.capacity.batch-size=131072
kates.tests.capacity.linger-ms=10
kates.tests.capacity.num-records=10000000
kates.tests.capacity.duration-ms=1200000
kates.tests.capacity.num-producers=5

kates.tests.round-trip.batch-size=16384
kates.tests.round-trip.linger-ms=0
kates.tests.round-trip.compression-type=none
kates.tests.round-trip.num-records=500000
kates.tests.round-trip.throughput=10000

quarkus.rest-client."com.klster.kates.trogdor.TrogdorClient".url=http://localhost:8889

quarkus.log.level=WARN
