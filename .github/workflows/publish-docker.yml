name: Publish Kates Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      variant:
        description: "Image variant to build"
        type: choice
        options:
          - jvm
          - native
          - both
        default: jvm
      platforms:
        description: "Target platforms"
        type: choice
        options:
          - linux/amd64,linux/arm64
          - linux/amd64
          - linux/arm64
        default: linux/amd64,linux/arm64

permissions:
  contents: read
  packages: write

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REPO: bmscomp/kates
  GHCR_REPO: ghcr.io/bmscomp/kates

jobs:
  meta:
    name: Compute Build Matrix
    runs-on: ubuntu-latest
    outputs:
      variants: ${{ steps.set.outputs.variants }}
      version: ${{ steps.version.outputs.version }}
      platforms: ${{ steps.set.outputs.platforms }}
      platform_matrix: ${{ steps.set.outputs.platform_matrix }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set build matrix
        id: set
        run: |
          VARIANT="${{ inputs.variant || 'both' }}"
          PLATFORMS="${{ inputs.platforms || 'linux/amd64,linux/arm64' }}"
          if [[ "${VARIANT}" == "both" ]]; then
            echo 'variants=["jvm","native"]' >> "$GITHUB_OUTPUT"
          else
            echo "variants=[\"${VARIANT}\"]" >> "$GITHUB_OUTPUT"
          fi
          echo "platforms=${PLATFORMS}" >> "$GITHUB_OUTPUT"

          # Build per-platform matrix: map each platform to its optimal runner
          MATRIX="["
          FIRST=true
          IFS=',' read -ra PLATS <<< "${PLATFORMS}"
          for p in "${PLATS[@]}"; do
            p="$(echo "$p" | xargs)"
            case "$p" in
              linux/amd64) RUNNER="ubuntu-latest" ; ARCH="amd64" ;;
              linux/arm64) RUNNER="ubuntu-24.04-arm" ; ARCH="arm64" ;;
            esac
            if [ "$FIRST" = true ]; then FIRST=false; else MATRIX+=","; fi
            MATRIX+="{\"platform\":\"${p}\",\"runner\":\"${RUNNER}\",\"arch\":\"${ARCH}\"}"
          done
          MATRIX+="]"
          echo "platform_matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  build-per-platform:
    name: Build ${{ matrix.variant }} (${{ matrix.platform.arch }})
    needs: meta
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.meta.outputs.variants) }}
        platform: ${{ fromJson(needs.meta.outputs.platform_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (cross-arch)
        if: false  # Not needed — arm64 builds run on native ARM runners
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Dockerfile
        id: dockerfile
        run: |
          if [[ "${{ matrix.variant }}" == "native" ]]; then
            echo "file=kates/Dockerfile.native" >> "$GITHUB_OUTPUT"
          else
            echo "file=kates/Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push (single arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.file }}
          platforms: ${{ matrix.platform.platform }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:sha-${{ github.sha }}-${{ matrix.platform.arch }}-${{ matrix.variant }}
            ${{ env.GHCR_REPO }}:sha-${{ github.sha }}-${{ matrix.platform.arch }}-${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-${{ matrix.platform.arch }}
          provenance: false

      - name: Export digest
        run: echo "${{ steps.build.outputs.digest }}" > /tmp/digest-${{ matrix.platform.arch }}.txt

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.variant }}-${{ matrix.platform.arch }}
          path: /tmp/digest-*.txt
          retention-days: 1

  merge-manifests:
    name: Merge Manifests (${{ matrix.variant }})
    needs: [meta, build-per-platform]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: ${{ fromJson(needs.meta.outputs.variants) }}
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_REPO }}
            ${{ env.GHCR_REPO }}
          flavor: |
            suffix=${{ matrix.variant == 'native' && '-native' || '' }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Kates Backend
            org.opencontainers.image.description=Kafka Advanced Testing & Engineering Suite
            org.opencontainers.image.vendor=klster
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}

      - name: Collect per-platform image refs
        id: refs
        run: |
          SUFFIX="${{ matrix.variant == 'native' && '-native' || '' }}"
          PLATFORMS="${{ needs.meta.outputs.platforms }}"
          SOURCES=""
          IFS=',' read -ra PLATS <<< "${PLATFORMS}"
          for p in "${PLATS[@]}"; do
            p="$(echo "$p" | xargs)"
            ARCH="${p#*/}"
            for REPO in "${{ env.DOCKERHUB_REPO }}" "${{ env.GHCR_REPO }}"; do
              TAG="sha-${{ github.sha }}-${ARCH}-${{ matrix.variant }}"
              if [ -n "${SOURCES}" ]; then SOURCES+=","; fi
              SOURCES+="${REPO}:${TAG}"
            done
          done
          echo "sources=${SOURCES}" >> "$GITHUB_OUTPUT"

      - name: Create and push multi-arch manifests
        run: |
          PLATFORMS="${{ needs.meta.outputs.platforms }}"
          TAGS=$(echo '${{ steps.docker-meta.outputs.tags }}')

          # Build source image list per registry
          IFS=',' read -ra PLATS <<< "${PLATFORMS}"
          for REPO in "${{ env.DOCKERHUB_REPO }}" "${{ env.GHCR_REPO }}"; do
            SOURCES=""
            for p in "${PLATS[@]}"; do
              p="$(echo "$p" | xargs)"
              ARCH="${p#*/}"
              TAG="sha-${{ github.sha }}-${ARCH}-${{ matrix.variant }}"
              SOURCES="${SOURCES} ${REPO}:${TAG}"
            done

            while IFS= read -r TAG; do
              # Only process tags for this registry
              if [[ "${TAG}" == "${REPO}:"* ]]; then
                echo "Creating manifest: ${TAG}"
                docker manifest create "${TAG}" ${SOURCES}
                docker manifest push "${TAG}"
              fi
            done <<< "${TAGS}"
          done

  sign:
    name: Sign Images
    needs: [meta, merge-manifests]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        variant: ${{ fromJson(needs.meta.outputs.variants) }}
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign images
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          SUFFIX: ${{ matrix.variant == 'native' && '-native' || '' }}
        run: |
          for REPO in "${{ env.DOCKERHUB_REPO }}" "${{ env.GHCR_REPO }}"; do
            IMAGE="${REPO}${SUFFIX}:${VERSION}"
            DIGEST=$(docker manifest inspect "${IMAGE}" -v 2>/dev/null | jq -r '.digest // empty' || true)
            if [[ -n "${DIGEST}" ]]; then
              cosign sign --yes "${REPO}${SUFFIX}@${DIGEST}"
            else
              echo "⚠️ Could not resolve digest for ${IMAGE}, skipping sign"
            fi
          done

  verify:
    name: Verify Published Images
    needs: [meta, merge-manifests]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: ${{ fromJson(needs.meta.outputs.variants) }}
    steps:
      - name: Pull and inspect
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          SUFFIX: ${{ matrix.variant == 'native' && '-native' || '' }}
        run: |
          for REPO in "${{ env.DOCKERHUB_REPO }}" "${{ env.GHCR_REPO }}"; do
            IMAGE="${REPO}${SUFFIX}:${VERSION}"
            echo "Inspecting ${IMAGE}..."
            docker manifest inspect "${IMAGE}" | head -20
            echo "---"
          done
