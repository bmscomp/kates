name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "kates/**"
      - "charts/kates/**"
      - "config/**"
  pull_request:
    branches: [main]
    paths:
      - "kates/**"
      - "charts/kates/**"
      - "config/**"

permissions:
  contents: read
  checks: write

env:
  JAVA_VERSION: "25"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build and test
        working-directory: kates
        run: ./mvnw verify -q -B -ntp

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: kates/target/surefire-reports/TEST-*.xml
          check_name: "JUnit Tests"

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Fetch chart dependencies
        run: helm dependency build charts/kates/

      - name: Lint kates chart
        run: helm lint charts/kates/

      - name: Template validation
        run: helm template kates charts/kates/ > /dev/null

  yaml-validation:
    name: YAML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Validate all config YAML files
        run: |
          FAILED=0
          for f in $(find config -name '*.yaml' -o -name '*.yml' | sort); do
            if python3 -c "
          import yaml, sys
          try:
              list(yaml.safe_load_all(open('$f')))
          except Exception as e:
              print(f'❌ $f: {e}')
              sys.exit(1)
          print(f'✅ $f')
          " 2>&1; then
              true
            else
              FAILED=1
            fi
          done
          exit $FAILED

  go-tests:
    name: CLI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: cli/go.sum

      - name: Run Go tests
        working-directory: cli
        run: go test ./... -v -race -count=1
