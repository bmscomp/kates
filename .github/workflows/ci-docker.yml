name: Docker Build Validation

on:
  push:
    branches: [main]
    paths:
      - "kates/Dockerfile*"
      - "cli/**"
      - "kates/pom.xml"
      - "kates/src/**"
  pull_request:
    branches: [main]
    paths:
      - "kates/Dockerfile*"
      - "cli/**"
      - "kates/pom.xml"
      - "kates/src/**"

permissions:
  contents: read

jobs:
  build-validation:
    name: Build ${{ matrix.variant }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- amd64 builds (fast, native runner) ---
          - variant: jvm
            arch: amd64
            platform: linux/amd64
            dockerfile: kates/Dockerfile
            runner: ubuntu-latest
            qemu: false

          - variant: native
            arch: amd64
            platform: linux/amd64
            dockerfile: kates/Dockerfile.native
            runner: ubuntu-latest
            qemu: false

          # --- arm64 build (native ARM runner, JVM only) ---
          # native/arm64 is excluded: GraalVM native-image is too slow
          # for CI even on native runners (~12 min) — validated at release time.
          - variant: jvm
            arch: arm64
            platform: linux/arm64
            dockerfile: kates/Dockerfile
            runner: ubuntu-24.04-arm
            qemu: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: false
          tags: kates:ci-${{ matrix.variant }}-${{ matrix.arch }}
          cache-from: type=gha,scope=ci-${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.variant }}-${{ matrix.arch }}
